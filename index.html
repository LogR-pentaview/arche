<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>아르케 · Arche</title>
<link rel="manifest" href="/manifest.json">
<style>
  html,body{margin:0;height:100%}
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f4f7f4;font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#5f6b5f}
  .box{text-align:center}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:.03em;color:#16241c;margin-bottom:6px}
  .logo b{color:#c8871a;font-weight:400}
  .msg{font-size:13px;color:#8a978a}
  .sp{width:26px;height:26px;border:3px solid rgba(200,135,26,.25);border-top-color:#c8871a;border-radius:50%;margin:0 auto 14px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
  <div class="box">
    <div class="sp"></div>
    <div class="logo">ARCHE<b>.</b></div>
    <div class="msg">불러오는 중…</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/shared/config.js"></script>
  <script src="/shared/supabase.js"></script>
  <script src="/shared/ai.js"></script>
  <script src="/shared/auth.js"></script>
  <script>
    // 안전장치: 무슨 일이 있어도 2.5초 내 로그인으로 보냄
    var _fallback = setTimeout(function(){ location.replace('/login'); }, 2500);
    (async function(){
      try{
        var s = await getSession();
        if(!s){ clearTimeout(_fallback); location.replace('/login'); return; }
        // 세션 있으면 역할별 앱으로 (routeByRole 내부에서 이동)
        var r = await routeByRole(s);
        if(r && r.ok===false){ clearTimeout(_fallback); location.replace('/login'); }
        else { clearTimeout(_fallback); }
      }catch(e){
        clearTimeout(_fallback); location.replace('/login');
      }
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0;url=/login">
    <p style="text-align:center">로그인 페이지로 이동합니다. <a href="/login">여기</a>를 클릭하세요.</p>
  </noscript>
</body>
</html>

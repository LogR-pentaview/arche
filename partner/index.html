<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>아르케 · 영업매니저</title>
<link rel="stylesheet" href="/shared/tokens.css">
<style>
  body{ min-height:100vh; background:#f6f8f6; }
  .wrap{ display:grid; grid-template-columns:224px 1fr; min-height:100vh; }
  .side{ background:#fff; border-right:1px solid var(--line); padding:22px 14px; display:flex; flex-direction:column; gap:1px; position:sticky; top:0; height:100vh; overflow-y:auto; }
  .side .logo{ font-family:'Bebas Neue'; font-size:28px; padding:2px 8px 0; letter-spacing:.02em; }
  .side .logo b{ color:var(--gold); font-weight:400; }
  .side .tag{ font-size:9px; letter-spacing:.16em; color:var(--ink-mute); text-transform:uppercase; padding:0 8px 16px; }
  .nav{ display:flex; align-items:center; gap:11px; padding:10px 11px; border-radius:10px; cursor:pointer; color:var(--ink-dim); font-size:13.5px; user-select:none; transition:.12s; }
  .nav svg{ width:17px; height:17px; flex:none; opacity:.7; }
  .nav:hover{ background:var(--panel-2); color:var(--ink); }
  .nav.on{ background:rgba(200,135,26,.10); color:var(--ink); font-weight:600; }
  .nav.on svg{ opacity:1; color:var(--gold); }
  .navlabel{ font-size:9px; letter-spacing:.16em; color:var(--ink-mute); text-transform:uppercase; padding:15px 11px 6px; }
  .side .foot{ margin-top:auto; padding-top:14px; border-top:1px solid var(--line); }
  .side .foot .who{ display:flex; align-items:center; gap:9px; }
  .side .foot .av{ width:32px; height:32px; border-radius:9px; background:rgba(200,135,26,.14); color:var(--gold); display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue'; font-size:16px; }
  .side .foot b{ font-size:12.5px; } .side .foot small{ display:block; color:var(--ink-mute); font-size:10px; }
  .lo{ margin-top:11px; width:100%; padding:9px; background:transparent; color:var(--ink-dim); border:1px solid var(--line); border-radius:9px; font-size:12px; cursor:pointer; font-family:inherit; }
  .lo:hover{ background:var(--panel-2); }
  .main{ padding:28px 34px 60px; max-width:1040px; }
  .h1{ font-family:'Bebas Neue'; font-size:32px; margin:0 0 2px; letter-spacing:.01em; }
  .sub{ color:var(--ink-dim); font-size:13px; margin-bottom:24px; }
  .codecard{ background:#fff; border:1px solid var(--line); border-left:3px solid var(--gold); border-radius:0 14px 14px 0; padding:18px 22px; display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; margin-bottom:22px; }
  .codecard .lab{ font-size:12px; color:var(--ink-dim); }
  .codecard .code{ font-family:'Bebas Neue'; font-size:36px; letter-spacing:.05em; color:var(--gold); margin-top:2px; }
  .kpis{ display:grid; grid-template-columns:repeat(4,1fr); gap:13px; margin-bottom:16px; }
  .kpi{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px 18px; }
  .kpi .lab{ font-size:12px; color:var(--ink-dim); display:flex; align-items:center; gap:6px; }
  .kpi .lab svg{ width:14px; height:14px; opacity:.6; }
  .kpi .num{ font-family:'Bebas Neue'; font-size:34px; line-height:1; margin-top:8px; }
  .kpi .num small{ font-size:13px; color:var(--ink-mute); font-family:'Noto Sans KR'; margin-left:2px; }
  .kpi .delta{ font-size:11px; color:var(--ink-mute); margin-top:6px; }
  .card{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:20px; margin-bottom:14px; }
  .card h3{ font-size:14px; margin:0 0 14px; font-weight:600; }
  table{ width:100%; border-collapse:collapse; }
  th{ text-align:left; font-size:10px; letter-spacing:.06em; color:var(--ink-mute); text-transform:uppercase; padding:0 10px 10px; border-bottom:1px solid var(--line); }
  td{ padding:12px 10px; font-size:13px; border-bottom:1px solid var(--line-soft); }
  tbody tr:last-child td{ border-bottom:0; }
  .nm{ font-weight:600; }
  .badge{ font-size:10px; border-radius:20px; padding:2px 9px; }
  .b-paid{ background:#e5f5ea; color:var(--safe); } .b-trial{ background:#f0f0ec; color:var(--ink-mute); }
  .b-b2c{ background:#f3e8fa; color:#7a3ca0; } .b-b2b{ background:#e5f0fa; color:#2d6da6; }
  .b-r50{ background:#fdf3d8; color:#8a6d1c; } .b-r35{ background:#eef3e8; color:#4a6d1c; }
  .b-verified{ background:#e5f5ea; color:var(--safe); } .b-req{ background:#fdf6e3; color:#7a5c00; }
  input{ width:100%; padding:11px 13px; background:#fff; border:1px solid var(--line); border-radius:10px; color:var(--ink); font-size:13px; margin-bottom:10px; font-family:inherit; }
  input:focus{ outline:none; border-color:var(--gold); }
  .btn{ padding:10px 18px; background:var(--lime); color:#fff; border:none; border-radius:10px; font-weight:700; cursor:pointer; font-size:13px; font-family:inherit; }
  .btn.gold{ background:var(--gold); color:#fff; } .btn:disabled{ opacity:.6; }
  .bankstatus{ font-size:12px; padding:9px 13px; border-radius:10px; margin-bottom:12px; }
  .bankstatus.verified{ background:#e5f5ea; color:var(--safe); } .bankstatus.requested{ background:#fdf6e3; color:#7a5c00; }
  .muted{ color:var(--ink-mute); font-size:13px; }
  .center{ display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; text-align:center; }
  .postlist .post{ padding:13px 0; border-bottom:1px solid var(--line-soft); }
  .postlist .post:last-child{ border-bottom:0; }
  .postlist .post .t{ font-size:13.5px; font-weight:600; }
  .postlist .post .m{ font-size:11px; color:var(--ink-mute); margin-top:3px; }
  .postlist .post .bd{ font-size:12.5px; color:var(--ink-dim); margin-top:6px; white-space:pre-wrap; line-height:1.6; }
  .postlist .post a{ color:var(--gold); font-size:12px; }
  .empty{ text-align:center; padding:30px; color:var(--ink-mute); font-size:13px; }
</style>
</head>
<body>
<div id="gate" class="center"><div class="muted">불러오는 중…</div></div>

<div id="app" class="wrap" style="display:none">
  <aside class="side">
    <div class="logo">ARCHE<b>.</b></div>
    <div class="tag">영업매니저</div>
    <div class="nav on" data-t="dash" onclick="go('dash')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg> 대시보드</div>
    <div class="navlabel">영업</div>
    <div class="nav" data-t="members" onclick="go('members')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="8" r="3.2"/><path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6"/><path d="M16 3.5a3.2 3.2 0 010 6"/><path d="M18 14c2.5.5 4 2.7 4 6"/></svg> 내 회원</div>
    <div class="nav" data-t="commission" onclick="go('commission')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg> 매출·커미션</div>
    <div class="navlabel">본사</div>
    <div class="nav" data-t="sales" onclick="go('sales')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 4h16v12H5.2L4 17.5z"/><path d="M8 9h8M8 12h5"/></svg> 영업지원 자료</div>
    <div class="nav" data-t="notice" onclick="go('notice')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10 5l9-2v14l-9-2z"/><path d="M10 5H6a2 2 0 00-2 2v3a2 2 0 002 2h4"/><path d="M7 15v4"/></svg> 본사 소식</div>
    <div class="nav" data-t="news" onclick="go('news')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 5h13v14H5a2 2 0 01-2-2V6"/><path d="M17 8h3v9a2 2 0 01-2 2"/><path d="M7 8h6M7 11h6M7 14h4"/></svg> 입시 뉴스</div>
    <div class="navlabel">정산</div>
    <div class="nav" data-t="bank" onclick="go('bank')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="6" width="20" height="13" rx="2"/><path d="M2 10h20"/></svg> 정산 계좌</div>
    <div class="foot">
      <div class="who"><div class="av" id="mgr-av">M</div><div><b id="mgr-name">매니저</b><small id="mgr-code">코드 —</small></div></div>
      <button class="lo" onclick="doLogout()">로그아웃</button>
    </div>
  </aside>
  <main class="main" id="panel"><div class="muted">불러오는 중…</div></main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/shared/config.js"></script>
<script src="/shared/supabase.js"></script>
<script src="/shared/ai.js"></script>
<script src="/shared/auth.js"></script>
<script>
  var MGR=null;
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];});}
  function won(n){ return '₩'+Number(n||0).toLocaleString(); }
  window.doLogout = async function(){ await signOut(); location.replace('/login'); };
  window.copyCode = function(){ if(!MGR||!MGR.ref_code)return; navigator.clipboard.writeText(MGR.ref_code).then(function(){ var b=document.getElementById('copyBtn'); if(b){var t=b.textContent;b.textContent='복사됨 ✓';setTimeout(function(){b.textContent=t;},1500);} }); };

  (async function init(){
   try{
    var session = await getSession();
    if(!session){ location.replace('/login'); return; }
    var r = await sb.from('sales_managers').select('id,name,ref_code,status').eq('uid',session.user.id).limit(1);
    if(r.error || !r.data || !r.data.length){
      document.getElementById('gate').innerHTML='<div><div class="h1" style="font-size:22px">영업매니저 계정이 아닙니다</div><p class="muted">승인된 영업매니저 전용입니다.</p><button class="btn" onclick="doLogout()">로그아웃</button></div>'; return;
    }
    MGR = r.data[0];
    if(MGR.status!=='approved'){
      var lbl = MGR.status==='rejected'?'가입이 반려되었습니다.':'가입 신청이 접수되었습니다. 본사 승인 후 이용 가능합니다.';
      document.getElementById('gate').innerHTML='<div><div class="h1" style="font-size:22px">승인 대기 중</div><p class="muted">'+lbl+'</p><button class="btn" onclick="doLogout()">로그아웃</button></div>'; return;
    }
    document.getElementById('gate').style.display='none';
    document.getElementById('app').style.display='grid';
    document.getElementById('mgr-name').textContent = MGR.name||'매니저';
    document.getElementById('mgr-code').textContent = MGR.ref_code?('코드 '+MGR.ref_code):'코드 발행 대기';
    document.getElementById('mgr-av').textContent = (MGR.name||'M').slice(0,1);
    go('dash');
   }catch(e){
    document.getElementById('gate').innerHTML='<div><div class="h1" style="font-size:22px">불러오기 오류</div><p class="muted">'+(e&&e.message||e)+'</p><button class="btn" onclick="doLogout()">로그아웃</button></div>';
    document.getElementById('gate').style.display='flex';
   }
  })();

  window.go = function(t){
    document.querySelectorAll('.nav').forEach(function(n){ n.classList.toggle('on', n.dataset.t===t); });
    var p=document.getElementById('panel'); p.innerHTML='<div class="muted">불러오는 중…</div>';
    if(t==='dash') return renderDash(p);
    if(t==='members') return renderMembers(p);
    if(t==='commission') return renderCommission(p);
    if(t==='sales') return renderPosts(p,'sales','영업지원 자료','본사가 배포한 영업 자료입니다.');
    if(t==='notice') return renderPosts(p,'notice','본사 소식','본사 공지사항입니다.');
    if(t==='news') return renderPosts(p,'news','입시 뉴스','입시 관련 소식입니다.');
    if(t==='bank') return renderBank(p);
  };

  async function renderDash(p){
    var codeHtml = MGR.ref_code
      ? '<div><div class="lab">내 영업코드 · 회원가입 시 안내하세요</div><div class="code">'+esc(MGR.ref_code)+'</div></div><button class="btn gold" id="copyBtn" onclick="copyCode()">복사</button>'
      : '<div><div class="lab">내 영업코드</div><div class="code" style="font-size:20px;color:var(--ink-mute)">발행 대기</div></div>';
    p.innerHTML = '<div class="h1">대시보드</div><div class="sub">'+new Date().toISOString().slice(0,10)+' 기준</div>'
      + '<div class="codecard">'+codeHtml+'</div>'
      + '<div class="kpis" id="kpis"><div class="muted">불러오는 중…</div></div>'
      + '<div class="card"><h3>최근 본사 소식</h3><div class="postlist" id="dash-notice"><div class="muted" style="font-size:12px">불러오는 중…</div></div></div>';
    var r = await sb.rpc('my_manager_summary');
    var s = (r.data && r.data[0]) || {total:0,paid:0,trial:0,commission:0};
    var conv = (s.total>0) ? Math.round((s.paid/s.total)*100) : 0;
    document.getElementById('kpis').innerHTML =
        kpi('관리 회원',(s.total||0),'명','유료 '+(s.paid||0)+' · 체험 '+(s.trial||0))
      + kpi('이번달 예상 커미션', won(s.commission), '', '구독료 기준', true)
      + kpi('유료 전환율', conv, '%', (s.paid||0)+' / '+(s.total||0))
      + kpi('정산 계좌', s.bank_status==='verified'?'확인':(s.bank_status?'대기':'미등록'), '', '', false, true);
    var pr = await sb.from('hq_posts').select('title,created_at').eq('published',true).eq('category','notice').order('created_at',{ascending:false}).limit(3);
    var dn = document.getElementById('dash-notice'); var rows=(pr&&pr.data)||[];
    dn.innerHTML = rows.length ? rows.map(function(x){return '<div class="post"><div class="t">'+esc(x.title)+'</div><div class="m">'+String(x.created_at||'').slice(0,10)+'</div></div>';}).join('') : '<div class="muted" style="font-size:12px">새 소식이 없습니다.</div>';
  }
  function kpi(lab,val,unit,delta,isMoney,isText){
    var num = isMoney||isText ? '<div class="num" style="font-size:'+(isMoney?'24px':'26px')+'">'+val+'</div>' : '<div class="num">'+val+'<small>'+unit+'</small></div>';
    return '<div class="kpi"><div class="lab">'+lab+'</div>'+num+(delta?'<div class="delta">'+delta+'</div>':'<div class="delta">&nbsp;</div>')+'</div>';
  }

  async function renderMembers(p){
    p.innerHTML='<div class="h1">내 회원</div><div class="sub">내 코드로 가입한 학원·학부모 회원</div><div class="card" id="ml"><div class="muted">불러오는 중…</div></div>';
    var r = await sb.rpc('my_referred_members'); var el=document.getElementById('ml');
    if(r.error){ el.innerHTML='<div class="muted">오류</div>'; return; }
    var rows=r.data||[];
    if(!rows.length){ el.innerHTML='<div class="empty">아직 귀속된 회원이 없습니다.<br>회원가입 시 내 영업코드를 안내하세요.</div>'; return; }
    el.innerHTML='<table><thead><tr><th>회원</th><th>유형</th><th>상태</th><th>가입일</th></tr></thead><tbody>'+rows.map(function(a){
      var type=a.account_type==='b2c'?'<span class="badge b-b2c">학부모</span>':'<span class="badge b-b2b">학원</span>';
      var stat=(a.approved&&!a.is_demo)?'<span class="badge b-paid">유료</span>':'<span class="badge b-trial">체험/대기</span>';
      return '<tr><td class="nm">'+esc(a.name||'-')+'</td><td>'+type+'</td><td>'+stat+'</td><td class="muted" style="font-size:12px">'+String(a.created_at||'').slice(0,10)+'</td></tr>';
    }).join('')+'</tbody></table>';
  }

  async function renderCommission(p){
    p.innerHTML='<div class="h1">매출·커미션</div><div class="sub">첫 2개월 50% → 이후 35% · 킬러콘텐츠 제외</div><div id="cl"><div class="muted">불러오는 중…</div></div>';
    var r = await sb.rpc('my_commission'); var el=document.getElementById('cl');
    if(r.error){ el.innerHTML='<div class="muted">오류: '+esc(r.error.message)+'</div>'; return; }
    var rows=r.data||[]; var total=rows.reduce(function(s,x){return s+(x.commission||0);},0);
    var head='<div class="kpis" style="grid-template-columns:repeat(2,1fr);max-width:440px">'+kpi('이번달 예상 커미션',won(total),'',rows.length+'명 대상',true)+kpi('회원 수',rows.length,'명','')+'</div>';
    if(!rows.length){ el.innerHTML=head+'<div class="card"><div class="empty">귀속 회원이 없습니다.</div></div>'; return; }
    el.innerHTML=head+'<div class="card"><h3>회원별 내역</h3><table><thead><tr><th>회원</th><th>유형</th><th>구독</th><th>요율</th><th style="text-align:right">커미션</th></tr></thead><tbody>'+rows.map(function(x){
      var type=x.account_type==='b2c'?'<span class="badge b-b2c">학부모</span>':'<span class="badge b-b2b">학원</span>';
      if(!x.subscribed) return '<tr><td class="nm">'+esc(x.member_name||'-')+'</td><td>'+type+'</td><td class="muted" colspan="3" style="font-size:12px">미구독 (커미션 0)</td></tr>';
      var rate=x.rate_pct===50?'<span class="badge b-r50">50%</span>':'<span class="badge b-r35">35%</span>';
      return '<tr><td class="nm">'+esc(x.member_name||'-')+'</td><td>'+type+'</td><td class="muted" style="font-size:12px">월 '+won(x.monthly_amount)+' · '+x.months_active+'개월차</td><td>'+rate+'</td><td style="text-align:right;font-weight:600">'+won(x.commission)+'</td></tr>';
    }).join('')+'</tbody></table></div><div class="muted" style="font-size:11px">실제 결제(구독) 기준으로 계산됩니다. 결제 연동 전에는 예상치입니다.</div>';
  }

  async function renderPosts(p,cat,title,desc){
    p.innerHTML='<div class="h1">'+esc(title)+'</div><div class="sub">'+esc(desc)+'</div><div id="pl"><div class="muted">불러오는 중…</div></div>';
    var r = await sb.from('hq_posts').select('title,body,link_url,pinned,created_at').eq('published',true).eq('category',cat).order('pinned',{ascending:false}).order('created_at',{ascending:false}).limit(50);
    var el=document.getElementById('pl');
    if(r.error){ el.innerHTML='<div class="muted">오류</div>'; return; }
    var rows=r.data||[];
    if(!rows.length){ el.innerHTML='<div class="card"><div class="empty">등록된 항목이 없습니다.</div></div>'; return; }
    el.innerHTML='<div class="card postlist">'+rows.map(function(x){
      var pin=x.pinned?'📌 ':'';
      var link=x.link_url?'<div style="margin-top:6px"><a href="'+esc(x.link_url)+'" target="_blank" rel="noopener">자료 열기 →</a></div>':'';
      var body=x.body?'<div class="bd">'+esc(x.body)+'</div>':'';
      return '<div class="post"><div class="t">'+pin+esc(x.title)+'</div><div class="m">'+String(x.created_at||'').slice(0,10)+'</div>'+body+link+'</div>';
    }).join('')+'</div>';
  }

  async function renderBank(p){
    p.innerHTML='<div class="h1">정산 계좌</div><div class="sub">영업비를 받을 계좌를 등록하면 관리자가 확인합니다</div>'
      + '<div class="card" style="max-width:460px"><div id="bank-status"></div>'
      + '<input id="b-bank" placeholder="은행명 (예: 국민은행)"><input id="b-acc" placeholder="계좌번호"><input id="b-holder" placeholder="예금주명">'
      + '<div id="b-msg" style="font-size:12px;min-height:16px;margin-bottom:8px"></div>'
      + '<button class="btn" id="b-btn" onclick="saveBank()">계좌 확인요청 보내기</button>'
      + '<div class="muted" style="font-size:11px;margin-top:12px;line-height:1.6">· 관리자가 계좌확인서를 대조한 뒤 확인 완료 처리합니다.<br>· 계좌를 수정하면 다시 확인 대기 상태가 됩니다. (원본 파일은 저장되지 않습니다)</div></div>';
    var r = await sb.from('manager_bank_accounts').select('bank_name,account_no,holder_name,status').eq('manager_id',MGR.id).limit(1);
    var d=(r.data&&r.data[0])||null; var box=document.getElementById('bank-status');
    if(d){
      document.getElementById('b-bank').value=d.bank_name||''; document.getElementById('b-acc').value=d.account_no||''; document.getElementById('b-holder').value=d.holder_name||'';
      if(d.status==='verified'){ box.className='bankstatus verified'; box.textContent='✓ 확인 완료된 계좌입니다.'; document.getElementById('b-btn').textContent='계좌 수정 (재확인 필요)'; }
      else { box.className='bankstatus requested'; box.textContent='⏳ 확인 대기 중입니다.'; document.getElementById('b-btn').textContent='계좌 확인요청 다시 보내기'; }
    }
  }
  window.saveBank = async function(){
    var bank=(document.getElementById('b-bank').value||'').trim(), acc=(document.getElementById('b-acc').value||'').trim(), hold=(document.getElementById('b-holder').value||'').trim();
    var m=document.getElementById('b-msg');
    if(!bank||!acc||!hold){ m.style.color='var(--risk)'; m.textContent='은행명·계좌번호·예금주를 모두 입력하세요.'; return; }
    document.getElementById('b-btn').disabled=true; m.style.color='var(--ink-mute)'; m.textContent='전송 중…';
    try{
      var r=await sb.from('manager_bank_accounts').upsert({manager_id:MGR.id,bank_name:bank,account_no:acc,holder_name:hold},{onConflict:'manager_id'});
      if(r.error) throw r.error;
      m.style.color='var(--safe)'; m.textContent='확인요청을 보냈습니다.'; renderBank(document.getElementById('panel'));
    }catch(e){ m.style.color='var(--risk)'; m.textContent='오류: '+(e.message||e); }
    finally{ document.getElementById('b-btn').disabled=false; }
  };
</script>
</body>
</html>

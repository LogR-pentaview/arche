<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>아르케 · 영업매니저 관리 (관리자)</title>
<link rel="stylesheet" href="/shared/tokens.css">
<style>
  body{ min-height:100vh; padding:24px 30px 60px; max-width:1100px; margin:0 auto; }
  .h1{ font-family:'Bebas Neue'; font-size:30px; margin:0 0 2px; }
  .sub{ color:var(--ink-dim); font-size:13px; margin-bottom:22px; }
  .card{ background:var(--panel); border:1px solid var(--line-soft); border-radius:14px; padding:18px; margin-bottom:18px; }
  .card h3{ font-size:15px; margin:0 0 12px; }
  table{ width:100%; border-collapse:collapse; }
  th{ text-align:left; font-size:10px; letter-spacing:.08em; color:var(--ink-mute); text-transform:uppercase; padding:8px 10px; border-bottom:1px solid var(--line); }
  td{ padding:11px 10px; font-size:13px; border-bottom:1px solid var(--line-soft); vertical-align:top; }
  .pill{ font-size:11px; padding:2px 9px; border-radius:20px; white-space:nowrap; }
  .pill.pending{ background:#fdf6e3; color:#7a5c00; }
  .pill.approved{ background:#e5f5ea; color:var(--safe); }
  .pill.rejected{ background:#fde8e8; color:var(--risk); }
  .pill.verified{ background:#e5f5ea; color:var(--safe); }
  .pill.requested{ background:#fdf6e3; color:#7a5c00; }
  .btn{ padding:6px 12px; border:none; border-radius:7px; font-weight:700; cursor:pointer; font-size:12px; font-family:inherit; }
  .btn.approve{ background:var(--lime); color:#fff; }
  .btn.reject{ background:transparent; color:var(--risk); border:1px solid var(--line); }
  .btn.verify{ background:var(--gold); color:#1a1200; }
  .btn:disabled{ opacity:.5; }
  input.codein{ width:110px; padding:6px 8px; border:1px solid var(--line); border-radius:6px; font-size:12px; background:var(--panel-2); color:var(--ink); font-family:inherit; }
  .muted{ color:var(--ink-mute); }
  .center{ display:flex; align-items:center; justify-content:center; min-height:80vh; text-align:center; }
  .bank{ font-size:12px; color:var(--ink-dim); line-height:1.5; }
  .back{ font-size:12px; color:var(--gold); text-decoration:underline; cursor:pointer; }
</style>
</head>
<body>
<div id="gate" class="center"><div class="muted">불러오는 중…</div></div>

<div id="app" style="display:none">
  <div class="h1">영업매니저 관리</div>
  <div class="sub">가입 신청 승인·코드 발행 및 정산 계좌 확인 <span class="back" onclick="location.href='/admin'">← 관리자 콘솔</span></div>

  <div class="card">
    <h3>매니저 목록</h3>
    <div style="overflow-x:auto">
      <table>
        <thead><tr><th>매니저</th><th>상태</th><th>코드</th><th>회원</th><th>계좌</th><th>처리</th></tr></thead>
        <tbody id="rows"><tr><td colspan="6" class="muted">불러오는 중…</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/shared/config.js"></script>
<script src="/shared/supabase.js"></script>
<script src="/shared/ai.js"></script>
<script src="/shared/auth.js"></script>
<script>
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];});}

  (async function init(){
    var session = await getSession();
    if(!session){ location.replace('/login'); return; }
    var info = await resolveRole(session.user);
    if(!info.isAdmin){
      document.getElementById('gate').innerHTML = '<div><div class="h1" style="font-size:22px">접근 권한 없음</div><p class="muted">관리자 전용 페이지입니다.</p></div>';
      return;
    }
    document.getElementById('gate').style.display='none';
    document.getElementById('app').style.display='block';
    load();
  })();

  async function load(){
    var r = await sb.rpc('admin_list_managers');
    var tb = document.getElementById('rows');
    if(r.error){ tb.innerHTML='<tr><td colspan="6" class="muted">오류: '+esc(r.error.message)+'</td></tr>'; return; }
    var rows = r.data||[];
    if(!rows.length){ tb.innerHTML='<tr><td colspan="6" class="muted">등록된 매니저가 없습니다.</td></tr>'; return; }
    tb.innerHTML = rows.map(function(m){
      var stat = '<span class="pill '+esc(m.status)+'">'+({pending:'대기',approved:'승인',rejected:'반려'})[m.status]+'</span>';
      var code = m.ref_code ? '<b>'+esc(m.ref_code)+'</b>' : (m.status==='pending'
        ? '<input class="codein" id="code-'+m.id+'" placeholder="희망:'+esc(m.desired_code||'자동')+'" value="'+esc(m.desired_code||'')+'">'
        : '<span class="muted">—</span>');
      // 계좌
      var bank = '<span class="muted">미제출</span>';
      if(m.bank_name){
        var bstat = m.bank_status==='verified' ? '<span class="pill verified">확인됨</span>' : '<span class="pill requested">확인대기</span>';
        bank = '<div class="bank">'+esc(m.bank_name)+' '+esc(m.account_no)+'<br>'+esc(m.holder_name)+' '+bstat+'</div>';
        if(m.bank_status!=='verified') bank += '<button class="btn verify" style="margin-top:6px" onclick="verifyBank(\''+m.id+'\')">계좌 확인완료</button>';
      }
      // 처리
      var act = '';
      if(m.status==='pending'){
        act = '<button class="btn approve" onclick="approve(\''+m.id+'\')">승인+코드발행</button> '
            + '<button class="btn reject" onclick="reject(\''+m.id+'\')">반려</button>';
      } else if(m.status==='approved'){
        act = '<span class="muted" style="font-size:11px">승인 완료</span>';
      } else { act = '<span class="muted" style="font-size:11px">반려됨</span>'; }

      return '<tr><td><b>'+esc(m.name||'-')+'</b><br><span class="muted" style="font-size:11px">'+esc(m.email||'')+'</span></td>'
        + '<td>'+stat+'</td><td>'+code+'</td><td>'+(m.member_count||0)+'명</td><td>'+bank+'</td><td>'+act+'</td></tr>';
    }).join('');
  }

  window.approve = async function(id){
    var el = document.getElementById('code-'+id);
    var desired = el ? (el.value||'').trim() : null;
    var r = await sb.rpc('approve_manager', { p_manager_id: id, p_desired: desired || null });
    if(r.error){ alert('승인 실패: '+r.error.message); return; }
    var code = (r.data && r.data[0] && r.data[0].ref_code) || '';
    alert('승인 완료 · 발행 코드: ' + code);
    load();
  };
  window.reject = async function(id){
    if(!confirm('이 매니저 가입을 반려할까요?')) return;
    var r = await sb.rpc('reject_manager', { p_manager_id: id });
    if(r.error){ alert('반려 실패: '+r.error.message); return; }
    load();
  };
  window.verifyBank = async function(id){
    if(!confirm('계좌확인서를 대조하셨나요? 확인 완료 처리합니다.')) return;
    var r = await sb.rpc('verify_manager_bank', { p_manager_id: id });
    if(r.error){ alert('처리 실패: '+r.error.message); return; }
    load();
  };
</script>
</body>
</html>

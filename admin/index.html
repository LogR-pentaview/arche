<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>아르케 · 관리자</title>
<meta name="theme-color" content="#3182f6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="아르케 관리자">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  :root{
    --surface-0:#f2f4f6; --surface-1:#f7f8fa; --surface-2:#ffffff;
    --border:#e5e8eb; --radius:12px;
    --text-primary:#191f28; --text-secondary:#4e5968; --text-muted:#8b95a1;
    --bg-accent:#e8f3ff; --text-accent:#3182f6;
    --bg-success:#ecfdf3; --text-success:#12b76a;
    --bg-danger:#fef3f2; --text-danger:#f04452;
    --bg-warn:#fffaeb; --text-warn:#f79009;
    --bg-purple:#f5f3ff; --text-purple:#7c3aed;
    --font-sans:'Pretendard Variable',Pretendard,'Noto Sans KR',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --font-mono:'JetBrains Mono',ui-monospace,monospace;
    --ink:var(--text-primary); --ink-dim:var(--text-secondary); --ink-mute:var(--text-muted);
    --gold:var(--text-accent); --lime:var(--text-accent); --safe:var(--text-success); --risk:var(--text-danger);
    --panel:var(--surface-2); --panel-2:var(--surface-1); --panel-3:var(--surface-1); --line:var(--border); --line-soft:var(--border); --shell:var(--surface-1);
  }
  *{ box-sizing:border-box; }
  body{ margin:0; min-height:100vh; background:var(--surface-0); font-family:var(--font-sans); color:var(--text-primary); -webkit-font-smoothing:antialiased; letter-spacing:-.01em; }
  .wrap{ display:grid; grid-template-columns:224px 1fr; min-height:100vh; }
  .side{ background:var(--surface-2); border-right:none; margin:14px 0 14px 14px; border-radius:22px; box-shadow:0 2px 14px rgba(25,31,40,.06); padding:18px 12px 14px; display:flex; flex-direction:column; gap:2px; position:sticky; top:14px; height:calc(100vh - 28px); overflow-y:auto; }
  .side::-webkit-scrollbar{ width:4px; } .side::-webkit-scrollbar-thumb{ background:var(--border); border-radius:4px; }
  .brand{ padding:4px 8px 16px; display:flex; align-items:center; gap:10px; }
  .brand .av{ width:34px; height:34px; border-radius:11px; background:var(--text-accent); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:17px; box-shadow:0 4px 10px rgba(49,130,246,.3); }
  .brand .nm{ font-size:15px; font-weight:800; letter-spacing:-.01em; } .brand .ro{ font-size:10.5px; color:var(--text-muted); font-weight:500; }
  .nav{ display:flex; align-items:center; gap:10px; padding:9px 11px; border-radius:12px; color:var(--text-secondary); font-size:13px; font-weight:600; cursor:pointer; user-select:none; transition:.13s; }
  .nav i{ font-size:17px; opacity:.8; }
  .nav:hover{ background:var(--surface-0); color:var(--text-primary); }
  .nav.on{ background:var(--text-accent); color:#fff; font-weight:700; box-shadow:0 4px 12px rgba(49,130,246,.26); }
  .nav.on i{ opacity:1; }
  .nav .b{ margin-left:auto; font-size:10px; font-weight:700; background:var(--text-danger); color:#fff; border-radius:20px; padding:1px 7px; }
  .navlabel{ font-size:10.5px; font-weight:700; letter-spacing:.02em; color:#b0b8c1; text-transform:none; padding:14px 11px 5px; }
  .side .foot{ margin-top:auto; padding:12px 8px 4px; border-top:1px solid #eef1f4; }
  .side .foot b{ font-size:12.5px; font-weight:700; } .side .foot small{ display:block; color:var(--text-muted); font-size:10.5px; }
  .lo{ margin-top:11px; width:100%; padding:9px; background:var(--surface-1); color:var(--text-secondary); border:none; border-radius:11px; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; transition:.13s; }
  .lo:hover{ color:var(--text-primary); background:var(--surface-0); }
  .main{ padding:24px 30px 50px; background:var(--surface-2); border-radius:22px; margin:14px; min-height:calc(100vh - 28px); max-width:1150px; box-shadow:0 2px 14px rgba(25,31,40,.05); }
  .h1{ font-size:21px; font-weight:800; margin:0 0 2px; letter-spacing:-.02em; }
  .sub{ color:var(--text-muted); font-size:13px; font-weight:500; margin-bottom:18px; }
  .kpis{ display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:11px; margin-bottom:14px; }
  .kpi{ background:var(--surface-1); border-radius:16px; padding:15px 17px; }
  .kpi .lab{ font-size:12px; font-weight:600; color:var(--text-muted); }
  .kpi .num{ font-size:26px; font-weight:800; letter-spacing:-.03em; margin-top:5px; }
  .kpi .num small{ font-size:12px; color:var(--text-muted); font-weight:500; }
  .alert{ display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
  .chip{ display:flex; align-items:center; gap:7px; background:var(--bg-warn); color:var(--text-warn); border-radius:12px; padding:10px 15px; font-size:12.5px; font-weight:600; cursor:pointer; }
  .chip b{ font-size:14px; }
  .chip.ok{ background:var(--bg-success); color:var(--text-success); cursor:default; }
  .card{ background:var(--surface-2); border:1px solid #eef1f4; border-radius:16px; padding:18px; margin-bottom:13px; }
  .card h3{ font-size:14px; margin:0 0 12px; font-weight:800; letter-spacing:-.01em; }
  .row{ display:flex; justify-content:space-between; align-items:center; gap:10px; padding:12px 13px; border:1px solid #eef1f4; border-radius:13px; margin-bottom:8px; }
  .row .nm{ font-weight:700; font-size:13.5px; }
  .row .meta{ font-size:11px; color:var(--text-muted); margin-top:3px; font-weight:500; }
  .badge{ font-size:10px; font-weight:700; border-radius:20px; padding:2px 8px; margin-left:4px; }
  .b-admin{ background:var(--text-primary); color:#fff; } .b-demo{ background:var(--bg-warn); color:var(--text-warn); }
  .b-member{ background:var(--bg-success); color:var(--text-success); } .b-wait{ background:var(--bg-danger); color:var(--text-danger); }
  .b-b2c{ background:var(--bg-purple); color:var(--text-purple); }
  .b-paid{ background:var(--bg-success); color:var(--text-success); } .b-trial{ background:var(--surface-1); color:var(--text-muted); }
  .b-pending{ background:var(--bg-warn); color:var(--text-warn); } .b-approved{ background:var(--bg-success); color:var(--text-success); } .b-rejected{ background:var(--bg-danger); color:var(--text-danger); }
  .b-verified{ background:var(--bg-success); color:var(--text-success); } .b-req{ background:var(--bg-warn); color:var(--text-warn); }
  .btn{ padding:7px 13px; border:none; border-radius:11px; font-weight:700; cursor:pointer; font-size:12px; font-family:inherit; transition:.13s; }
  .btn.g{ background:var(--text-accent); color:#fff; } .btn.g:hover{ background:#1b64da; }
  .btn.o{ background:var(--surface-2); color:var(--text-secondary); border:1px solid var(--border); } .btn.gold{ background:var(--text-warn); color:#fff; }
  .btn:disabled{ opacity:.5; }
  input.ci{ width:110px; padding:7px 9px; border:1px solid var(--border); border-radius:9px; font-size:12px; background:var(--surface-2); color:var(--text-primary); font-family:inherit; }
  .muted{ color:var(--text-muted); font-size:13px; }
  .center{ display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:20px; }
  .soon{ background:var(--surface-1); border:1.5px dashed var(--border); border-radius:16px; padding:38px; text-align:center; color:var(--text-muted); font-size:13px; }
  .filt{ display:inline-flex; background:var(--surface-1); border:none; border-radius:12px; overflow:hidden; margin-bottom:14px; padding:3px; gap:3px; }
  .filt button{ background:transparent; border:none; padding:7px 14px; font-size:12px; font-weight:600; color:var(--text-secondary); cursor:pointer; font-family:inherit; border-radius:9px; transition:.13s; }
  .filt button.on{ background:#fff; color:var(--text-accent); font-weight:700; box-shadow:0 1px 3px rgba(25,31,40,.1); }
  h2,h3{ font-weight:700; }
  input:focus,textarea:focus,select:focus{ outline:none; border-color:var(--text-accent)!important; }
  #mnav-btn{display:none}
  #mnav-backdrop{display:none;position:fixed;inset:0;background:rgba(15,20,30,.4);z-index:120}
  #mnav-backdrop.open{display:block}
  @media(max-width:720px){
    .wrap{ grid-template-columns:1fr; }
    .side{ position:fixed; left:0; top:0; height:100vh; width:236px; z-index:130; margin:0; border-radius:0; transform:translateX(-100%); transition:transform .25s ease; box-shadow:3px 0 24px rgba(0,0,0,.18); }
    .side.open{ transform:translateX(0); }
    #mnav-btn{ display:flex!important; }
    .main{ padding:54px 16px 40px; margin:0; border-radius:0; min-height:100vh; }
  }
</style>
</head>
<body>
<div id="gate" class="center"><div class="muted">불러오는 중…</div></div>

<div id="app" class="wrap" style="display:none">
  <button id="mnav-btn" onclick="toggleMobileNav()" aria-label="메뉴" style="display:none;position:fixed;top:12px;left:12px;z-index:140;width:38px;height:38px;background:var(--surface-2);border:1px solid var(--border);border-radius:11px;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--text-primary);box-shadow:0 2px 8px rgba(0,0,0,.1)">☰</button>
  <div id="mnav-backdrop" onclick="toggleMobileNav()"></div>
  <aside class="side">
    <div class="brand"><div class="av">A</div><div><div class="nm">아르케</div><div class="ro">본사 관리자</div></div></div>
    <div class="nav on" data-t="dash" onclick="go('dash')"><i class="ti ti-layout-dashboard"></i>대시보드</div>
    <div class="navlabel">회원</div>
    <div class="nav" data-t="acad" onclick="go('acad')"><i class="ti ti-building-store"></i>학원 회원</div>
    <div class="nav" data-t="parent" onclick="go('parent')"><i class="ti ti-users"></i>학부모 회원</div>
    <div class="navlabel">영업</div>
    <div class="nav" data-t="mgr" onclick="go('mgr')"><i class="ti ti-user-star"></i>영업매니저<span class="b" id="nb-mgr" style="display:none">0</span></div>
    <div class="nav" data-t="commission" onclick="go('commission')"><i class="ti ti-coin"></i>커미션·정산</div>
    <div class="nav" data-t="posts" onclick="go('posts')"><i class="ti ti-speakerphone"></i>공지·자료 배포</div>
    <div class="nav" data-t="mreq" onclick="go('mreq')"><i class="ti ti-message-2"></i>매니저 요청<span class="b" id="nb-mreq" style="display:none">0</span></div>
    <div class="navlabel">운영</div>
    <div class="nav" data-t="admission" onclick="go('admission')"><i class="ti ti-database"></i>입시 자료</div>
    <div class="nav" data-t="apikey" onclick="go('apikey')"><i class="ti ti-key"></i>API 키</div>
    <div class="nav" data-t="apicost" onclick="go('apicost')"><i class="ti ti-chart-bar"></i>API 사용량·비용</div>
    <div class="nav" data-t="slot" onclick="go('slot')"><i class="ti ti-shield-check"></i>슬롯 무결성</div>
    <div class="nav" data-t="billing" onclick="go('billing')"><i class="ti ti-credit-card"></i>결제</div>
    <div class="foot"><b id="who">관리자</b><small>로그·알 입시연구소</small>
      <button class="lo" onclick="doLogout()">로그아웃</button>
      <div style="margin-top:9px;display:flex;align-items:center;gap:6px;flex-wrap:wrap"><span style="font-size:10px;color:var(--text-muted);font-family:var(--font-mono)">v<span id="ver-cur">-</span></span><button onclick="checkAppUpdate()" style="font-size:10px;padding:3px 8px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--text-secondary);cursor:pointer;font-family:inherit">최신확인</button><button id="ver-apply" onclick="applyAppUpdate()" style="display:none;font-size:10px;padding:3px 8px;border:none;border-radius:8px;background:var(--text-accent);color:#fff;cursor:pointer;font-family:inherit">업데이트</button></div>
      <div id="ver-msg" style="font-size:10px;margin-top:4px;min-height:12px"></div></div>
  </aside>
  <main class="main" id="panel"><div class="muted">불러오는 중…</div></main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/shared/config.js"></script>
<script src="/shared/supabase.js"></script>
<script src="/shared/ai.js"></script>
<script src="/shared/auth.js"></script>
<script>

  var SUMMARY = null;
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];});}
  window.doLogout = async function(){ await signOut(); location.replace('/login'); };
  window.APP_VERSION="2026.07.19.1";
  (function(){ var el=document.getElementById('ver-cur'); if(el)el.textContent=window.APP_VERSION; })();
  window.checkAppUpdate=async function(){
    var m=document.getElementById('ver-msg'),ap=document.getElementById('ver-apply');
    if(m){m.style.color='var(--text-muted)';m.textContent='확인 중…';}
    try{
      var base=location.origin+location.pathname.replace(/\/+$/,'');
      var r=await fetch(base+'?nocache='+Date.now(),{cache:'no-store'});
      var t=await r.text();
      var mm=t.match(/APP_VERSION\s*=\s*"([^"]+)"/);
      var latest=mm?mm[1]:null;
      if(!latest){if(m){m.style.color='var(--text-danger)';m.textContent='버전 정보 없음';}return;}
      if(latest===window.APP_VERSION){if(m){m.style.color='var(--text-success)';m.textContent='최신 버전 (v'+latest+')';}if(ap)ap.style.display='none';}
      else{if(m){m.style.color='var(--text-warn)';m.textContent='새 버전 v'+latest+' 있음 → [업데이트]';}if(ap)ap.style.display='inline-block';}
    }catch(e){if(m){m.style.color='var(--text-danger)';m.textContent='확인 실패';}}
  };
  window.applyAppUpdate=async function(){
    var m=document.getElementById('ver-msg'); if(m){m.style.color='var(--text-muted)';m.textContent='업데이트 중…';}
    try{ if(window.caches){var keys=await caches.keys();await Promise.all(keys.map(function(k){return caches.delete(k);}));}
      if(navigator.serviceWorker){var reg=await navigator.serviceWorker.getRegistration();if(reg){if(reg.waiting)reg.waiting.postMessage({type:'SKIP_WAITING'});await reg.update();}}
    }catch(e){}
    location.reload();
  };

  // admin-api 엣지함수 호출 (옛 콘솔과 동일 백엔드 재사용)
  async function adminApi(payload){
    var s = await getSession();
    var r = await fetch(FN_BASE + '/admin-api', {
      method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+(s?s.access_token:'')},
      body: JSON.stringify(payload)
    });
    return await r.json();
  }

  (async function init(){
   try{
    var session = await getSession();
    if(!session){ location.replace('/login'); return; }
    var info = await resolveRole(session.user);
    if(!info.isAdmin){
      document.getElementById('gate').innerHTML = '<div><div class="h1" style="font-size:22px">접근 권한 없음</div><p class="muted">관리자 전용입니다.</p><button class="lo" style="max-width:160px" onclick="doLogout()">로그아웃</button></div>';
      return;
    }
    document.getElementById('gate').style.display='none';
    document.getElementById('app').style.display='grid';
    document.getElementById('who').textContent = session.user.email || '관리자';
    go('dash');
   }catch(e){
    document.getElementById('gate').innerHTML = '<div><div class="h1" style="font-size:22px">불러오기 오류</div><p class="muted">'+(e&&e.message||e)+'</p><button class="lo" style="max-width:160px" onclick="doLogout()">로그아웃</button></div>';
    document.getElementById('gate').style.display='flex';
   }
  })();

  window.toggleMobileNav = function(){ var s=document.querySelector('.side'); var b=document.getElementById('mnav-backdrop'); if(!s)return; var open=s.classList.toggle('open'); if(b)b.classList.toggle('open',open); };
  window.go = function(t){
    try{ if(window.innerWidth<=720){ var _s=document.querySelector('.side'); var _b=document.getElementById('mnav-backdrop'); if(_s)_s.classList.remove('open'); if(_b)_b.classList.remove('open'); } }catch(e){}
    document.querySelectorAll('.nav').forEach(function(n){ n.classList.toggle('on', n.dataset.t===t); });
    var p = document.getElementById('panel');
    p.innerHTML = '<div class="muted">불러오는 중…</div>';
    if(t==='dash') return renderDash(p);
    if(t==='acad') return renderMembers(p, 'b2b');
    if(t==='parent') return renderMembers(p, 'b2c');
    if(t==='mgr') return renderManagers(p);
    if(t==='commission') return renderCommission(p);
    if(t==='posts') return renderPosts(p);
    if(t==='mreq') return renderMReq(p);
    if(t==='slot') return renderSlot(p);
    if(t==='admission') return renderAdmission(p);
    if(t==='apikey') return renderApiKey(p);
    if(t==='apicost') return renderApiCost(p);
    if(t==='billing') return renderBilling(p);
    p.innerHTML = '<div class="muted">알 수 없는 탭</div>';
  };

  // ===== 대시보드 =====
  async function renderDash(p){
    var r = await sb.rpc('admin_dashboard_summary');
    var s = (r.data && r.data[0]) || {}; SUMMARY = s;
    var alerts = '';
    if((s.managers_pending||0)>0) alerts += '<div class="chip" onclick="go(\'mgr\')">매니저 승인 대기 <b>'+s.managers_pending+'</b></div>';
    if((s.bank_pending||0)>0) alerts += '<div class="chip" onclick="go(\'mgr\')">정산계좌 확인 대기 <b>'+s.bank_pending+'</b></div>';
    if(!alerts) alerts = '<div class="chip ok">✓ 처리 대기 항목 없음</div>';
    var b = document.getElementById('nb-mgr');
    if((s.managers_pending||0)>0){ b.style.display='inline'; b.textContent=s.managers_pending; } else b.style.display='none';
    p.innerHTML =
      '<div class="h1">본사 대시보드</div><div class="sub">'+new Date().toISOString().slice(0,10)+' 기준</div>'
      + '<div class="alert">'+alerts+'</div>'
      + '<div class="kpis">'
      + '<div class="kpi"><div class="lab">학원 회원</div><div class="num">'+(s.academies||0)+'<small> 곳</small></div></div>'
      + '<div class="kpi"><div class="lab">학부모 회원</div><div class="num">'+(s.parents||0)+'<small> 명</small></div></div>'
      + '<div class="kpi"><div class="lab">영업매니저</div><div class="num">'+(s.managers||0)+'<small> 명</small></div></div>'
      + '<div class="kpi"><div class="lab">전체 학생</div><div class="num">'+(s.students||0)+'<small> 명</small></div></div>'
      + '</div>';
  }

  // ===== 학원/학부모 회원 =====
  async function renderMembers(p, type){
    var title = type==='b2c' ? '학부모 회원' : '학원 회원';
    p.innerHTML = '<div class="h1">'+title+'</div><div class="sub">회원 승인·상태 관리</div><div id="mlist"><div class="muted">불러오는 중…</div></div>';
    var d = await adminApi({action:'academies'});
    var list = document.getElementById('mlist');
    if(d.error){ list.innerHTML='<div class="muted">오류: '+esc(d.error)+'</div>'; return; }
    var rows = (d.rows||[]).filter(function(a){
      if(a.is_admin) return false;
      return type==='b2c' ? a.account_type==='b2c' : a.account_type!=='b2c';
    });
    if(!rows.length){ list.innerHTML='<div class="muted">회원이 없습니다.</div>'; return; }
    list.innerHTML = rows.map(function(a){
      var ap = a.approved!==false;
      var kind = a.is_demo ? '<span class="badge b-demo">체험</span>' : (ap?'<span class="badge b-member">정회원</span>':'<span class="badge b-wait">승인대기</span>');
      var btns='';
      if(!ap && !a.is_demo) btns += '<button class="btn g" onclick="mApprove(\''+a.id+'\')">승인</button> ';
      if(a.is_demo) btns += '<button class="btn g" onclick="mDemo(\''+a.id+'\',false)">정회원 전환</button>';
      else btns += '<button class="btn o" onclick="mDemo(\''+a.id+'\',true)">체험 전환</button>';
      return '<div class="row"><div><div class="nm" style="cursor:pointer" onclick="openMemberDetail(\''+a.id+'\')">'+esc(a.name||'-')+' '+kind+' <span style="font-size:11px;color:var(--text-accent);font-weight:600">상세 ›</span></div>'

  window.csvUpload = async function(table){
    var m=document.getElementById('upmsg-'+table);
    var raw=(document.getElementById('up-'+table).value||'').trim();
    if(!raw){ m.style.color='var(--risk)'; m.textContent='CSV를 입력하세요.'; return; }
    var lines=raw.split(/\r?\n/).filter(function(x){return x.trim();});
    var hd=lines[0].split(',').map(function(x){return x.trim().replace(/\(JSON\)/i,'');});
    var rows=[];
    for(var i=1;i<lines.length;i++){
      var cells=lines[i].split(','); var o={};
      hd.forEach(function(h,idx){ var v=(cells[idx]||'').trim(); if(/^\[|^\{/.test(v)){try{v=JSON.parse(v);}catch(e){}} o[h]=v; });
      rows.push(o);
    }
    m.style.color='var(--ink-mute)'; m.textContent='추가 중…';
    var r=await adminApi({action:'insert', table:table, rows:rows});
    if(r.error){ m.style.color='var(--risk)'; m.textContent='실패: '+r.error; return; }
    m.style.color='var(--safe)'; m.textContent=(r.inserted||rows.length)+'건 추가 완료.';
    document.getElementById('up-'+table).value='';
  };

    if(!title){ m.style.color='var(--risk)'; m.textContent='제목을 입력하세요.'; return; }
    m.style.color='var(--ink-mute)'; m.textContent='게시 중…';
    var s = await getSession();
    var r = await sb.from('hq_posts').insert({
      category: pCat, title: title,
      body: (document.getElementById('p-body').value||'').trim() || null,
      link_url: (document.getElementById('p-link').value||'').trim() || null,
      pinned: document.getElementById('p-pin').checked,
      created_by: s ? s.user.id : null
    });
    if(r.error){ m.style.color='var(--risk)'; m.textContent='실패: '+r.error.message; return; }
    m.style.color='var(--safe)'; m.textContent='게시 완료.';
    document.getElementById('p-title').value=''; document.getElementById('p-body').value=''; document.getElementById('p-link').value=''; document.getElementById('p-pin').checked=false;
    pLoad();
  };
  async function pLoad(){
    var list=document.getElementById('plist');
    var r = await sb.from('hq_posts').select('id,category,title,body,link_url,pinned,created_at').order('created_at',{ascending:false}).limit(50);
    if(r.error){ list.innerHTML='<div class="muted">목록 오류: '+esc(r.error.message)+'</div>'; return; }
    var rows=r.data||[];
    if(!rows.length){ list.innerHTML='<div class="muted" style="margin-top:14px">아직 게시글이 없습니다.</div>'; return; }
    list.innerHTML = '<div class="card" style="margin-top:14px"><h3>게시글 ('+rows.length+')</h3>'
      + rows.map(function(x){
        var cat = '<span class="badge b-demo">'+esc(CAT_LABEL[x.category]||x.category)+'</span>';
        var pin = x.pinned ? ' 📌' : '';
        return '<div class="row"><div style="flex:1"><div class="nm" style="font-size:13px">'+esc(x.title)+pin+' '+cat+'</div>'
          + '<div class="meta">'+String(x.created_at||'').slice(0,10)+(x.link_url?' · 링크 있음':'')+'</div></div>'
          + '<button class="btn o" onclick="pDel(\''+x.id+'\')">삭제</button></div>';
      }).join('') + '</div>';
  }
  window.pDel = async function(id){
    if(!confirm('이 글을 삭제할까요?')) return;
    var r = await sb.from('hq_posts').delete().eq('id',id);
    if(r.error){ alert('삭제 실패: '+r.error.message); return; }
    pLoad();
  };

  // ===== 슬롯 무결성 =====
  async function renderSlot(p){
    p.innerHTML = '<div class="h1">슬롯 무결성</div><div class="sub">창체 지문 기반 슬롯 재활용 의심 모니터링</div><div id="slist"><div class="muted">불러오는 중…</div></div>';
    var r = await sb.rpc('admin_flagged_slots');
    var list = document.getElementById('slist');
    if(r.error){ list.innerHTML='<div class="muted">오류: '+esc(r.error.message||'')+'</div>'; return; }
    var rows = r.data||[];
    if(!rows.length){ list.innerHTML='<div class="card" style="color:var(--ink-mute)">플래그된 슬롯이 없습니다. ✓</div>'; return; }
    list.innerHTML = rows.map(function(x){
      var pct=Math.round((x.overlap||0)*100);
      var ov = x.overridden ? '<span class="badge b-demo">사유입력 진행됨</span>' : '<span class="badge" style="background:var(--risk);color:#fff">차단됨</span>';
      return '<div class="row"><div><div class="nm">'+esc(x.student_name||x.student_id||'-')+' '+ov+'</div><div class="meta">기존과 겹침 '+pct+'%</div></div></div>';
    }).join('');
  }
</script>

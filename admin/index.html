<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>아르케 · 관리자용 (테스트 껍데기)</title>
<style>
  :root{ --ink:#12160f; --panel:#1b2018; --line:#2d372a; --dim:#9fb0a0; --gold:#c8a24a; --safe:#7fb800; --risk:#e0533d; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,"Malgun Gothic","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
        background:var(--ink); color:#eaf3ee; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .card{ width:100%; max-width:440px; background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:26px 24px; }
  .logo{ display:flex; align-items:center; gap:10px; margin-bottom:6px; }
  .logo .a{ width:30px; height:30px; border-radius:8px; background:#eaf3ee; color:#12160f; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:17px; }
  h1{ font-size:16px; margin:0; font-weight:600; }
  .sub{ font-size:12px; color:var(--dim); margin:2px 0 20px; }
  .row{ display:flex; align-items:center; gap:10px; padding:11px 12px; border:1px solid var(--line); border-radius:10px; margin-bottom:9px; font-size:13px; }
  .dot{ width:9px; height:9px; border-radius:50%; background:#556; flex-shrink:0; }
  .dot.ok{ background:var(--safe); } .dot.no{ background:var(--risk); }
  .row .v{ margin-left:auto; color:var(--dim); font-size:12px; }
  .note{ font-size:11px; color:var(--dim); line-height:1.6; margin-top:16px; border-top:1px solid var(--line); padding-top:14px; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo"><div class="a">A</div><h1>아르케 · 관리자용</h1></div>
    <div class="sub">shared 연결 테스트 껍데기 · 정식 화면 아님</div>

    <div class="row"><span class="dot" id="d-lib"></span> supabase 라이브러리 <span class="v" id="v-lib">확인 중…</span></div>
    <div class="row"><span class="dot" id="d-cfg"></span> shared/config.js <span class="v" id="v-cfg">확인 중…</span></div>
    <div class="row"><span class="dot" id="d-sb"></span> Supabase 클라이언트 <span class="v" id="v-sb">확인 중…</span></div>
    <div class="row"><span class="dot" id="d-db"></span> DB 연결 <span class="v" id="v-db">확인 중…</span></div>
    <div class="row"><span class="dot" id="d-auth"></span> auth.js 로드 <span class="v" id="v-auth">확인 중…</span></div>
    <div class="row"><span class="dot" id="d-sess"></span> 로그인 세션 <span class="v" id="v-sess">확인 중…</span></div>

    <div class="note">
      이 페이지가 <b style="color:var(--safe)">전부 초록불</b>이면 shared 토대가 새 폴더에서도 정상 작동한다는 뜻입니다.
      확인 후 이 자리에 실제 관리자용 화면을 옮겨옵니다.
    </div>
  </div>

<!-- ===== 외부 라이브러리 ===== -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- ===== 공통 (shared) · 반드시 이 순서 ===== -->
<script src="/shared/config.js"></script>
<script src="/shared/supabase.js"></script>
<script src="/shared/ai.js"></script>
<script src="/shared/auth.js"></script>

<!-- ===== 이 페이지 전용: 연결 점검 ===== -->
<script>
function set(id, ok, text){
  var d=document.getElementById('d-'+id), v=document.getElementById('v-'+id);
  if(d) d.className='dot '+(ok?'ok':'no');
  if(v) v.textContent=text;
}
(async function check(){
  var libOk = !!(window.supabase && window.supabase.createClient);
  set('lib', libOk, libOk?'로드됨':'실패');
  var cfgOk = (typeof SB_URL!=='undefined' && !!SB_URL);
  set('cfg', cfgOk, cfgOk?'로드됨':'실패');
  var sbOk = !!window.sb;
  set('sb', sbOk, sbOk?'생성됨':'실패');
  if(sbOk){
    try{
      var r = await sb.from('achievement_standards').select('*',{count:'exact',head:true});
      if(r.error) throw r.error;
      set('db', true, '연결됨 · 성취기준 '+(r.count||0).toLocaleString());
    }catch(e){ set('db', false, '실패: '+(e.message||e)); }
  } else { set('db', false, '건너뜀'); }
  var authOk = (typeof routeByRole==='function');
  set('auth', authOk, authOk?'로드됨':'실패');
  if(sbOk){
    try{
      var s = await getSession();
      if(s){ set('sess', true, s.user.email); }
      else { set('sess', true, '로그인 안 됨 (정상)'); }
    }catch(e){ set('sess', false, '오류'); }
  } else { set('sess', false, '건너뜀'); }
})();
</script>
</body>
</html>

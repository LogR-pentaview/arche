<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>아르케 · 관리자</title>
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css" rel="stylesheet">
<style>
  :root{
    --surface-0:#eef0eb; --surface-1:#f5f6f2; --surface-2:#ffffff;
    --border:rgba(22,26,22,.11); --radius:8px;
    --text-primary:#1d211d; --text-secondary:#5f5e5a; --text-muted:#9a9a94;
    --bg-accent:#E6F1FB; --text-accent:#185FA5;
    --bg-success:#E1F5EE; --text-success:#0F6E56;
    --bg-danger:#FCEBEB; --text-danger:#A32D2D;
    --bg-warn:#FAEEDA; --text-warn:#854F0B;
    --bg-purple:#EEEDFE; --text-purple:#534AB7;
    --font-sans:'Noto Sans KR',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --font-mono:'JetBrains Mono',ui-monospace,monospace;
    --ink:var(--text-primary); --ink-dim:var(--text-secondary); --ink-mute:var(--text-muted);
    --gold:var(--text-accent); --lime:var(--text-accent); --safe:var(--text-success); --risk:var(--text-danger);
    --panel:var(--surface-2); --panel-2:var(--surface-1); --panel-3:var(--surface-1); --line:var(--border); --line-soft:var(--border); --shell:var(--surface-1);
  }
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono&display=swap');
  *{ box-sizing:border-box; }
  body{ margin:0; min-height:100vh; background:var(--surface-0); font-family:var(--font-sans); color:var(--text-primary); -webkit-font-smoothing:antialiased; }
  .wrap{ display:grid; grid-template-columns:200px 1fr; min-height:100vh; }
  .side{ background:var(--surface-1); border-right:.5px solid var(--border); padding:14px 11px; display:flex; flex-direction:column; gap:2px; position:sticky; top:0; height:100vh; overflow-y:auto; }
  .brand{ padding:6px 8px 14px; display:flex; align-items:center; gap:8px; }
  .brand .av{ width:28px; height:28px; border-radius:7px; background:var(--text-primary); color:var(--surface-2); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:15px; }
  .brand .nm{ font-size:13.5px; font-weight:500; } .brand .ro{ font-size:10px; color:var(--text-muted); }
  .nav{ display:flex; align-items:center; gap:9px; padding:8px 10px; border-radius:var(--radius); color:var(--text-secondary); font-size:12.5px; cursor:pointer; user-select:none; }
  .nav i{ font-size:17px; }
  .nav:hover{ background:var(--surface-2); color:var(--text-primary); }
  .nav.on{ background:var(--bg-accent); color:var(--text-accent); font-weight:500; }
  .nav .b{ margin-left:auto; font-size:10px; background:var(--text-danger); color:#fff; border-radius:20px; padding:1px 6px; }
  .navlabel{ font-size:9px; letter-spacing:.14em; color:var(--text-muted); text-transform:uppercase; padding:12px 10px 4px; }
  .side .foot{ margin-top:auto; padding:12px 8px 4px; border-top:.5px solid var(--border); }
  .side .foot b{ font-size:12px; font-weight:500; } .side .foot small{ display:block; color:var(--text-muted); font-size:10px; }
  .lo{ margin-top:11px; width:100%; padding:8px; background:var(--surface-2); color:var(--text-secondary); border:.5px solid var(--border); border-radius:var(--radius); font-size:12px; cursor:pointer; font-family:inherit; }
  .lo:hover{ color:var(--text-primary); }
  .main{ padding:20px 26px 50px; background:var(--surface-2); min-height:100vh; max-width:1150px; }
  .h1{ font-size:19px; font-weight:500; margin:0 0 2px; }
  .sub{ color:var(--text-secondary); font-size:13px; margin-bottom:18px; }
  .kpis{ display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:11px; margin-bottom:14px; }
  .kpi{ background:var(--surface-1); border-radius:var(--radius); padding:13px 15px; }
  .kpi .lab{ font-size:12px; color:var(--text-secondary); }
  .kpi .num{ font-size:24px; font-weight:500; margin-top:5px; }
  .kpi .num small{ font-size:12px; color:var(--text-muted); font-weight:400; }
  .alert{ display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
  .chip{ display:flex; align-items:center; gap:7px; background:var(--bg-warn); color:var(--text-warn); border-radius:var(--radius); padding:9px 14px; font-size:12.5px; cursor:pointer; }
  .chip b{ font-size:14px; }
  .chip.ok{ background:var(--bg-success); color:var(--text-success); cursor:default; }
  .card{ background:var(--surface-2); border:.5px solid var(--border); border-radius:12px; padding:17px; margin-bottom:13px; }
  .card h3{ font-size:14px; margin:0 0 12px; font-weight:500; }
  .row{ display:flex; justify-content:space-between; align-items:center; gap:10px; padding:11px 12px; border:.5px solid var(--border); border-radius:10px; margin-bottom:8px; }
  .row .nm{ font-weight:500; font-size:13.5px; }
  .row .meta{ font-size:11px; color:var(--text-muted); margin-top:3px; }
  .badge{ font-size:10px; border-radius:20px; padding:2px 8px; margin-left:4px; }
  .b-admin{ background:var(--text-primary); color:#fff; } .b-demo{ background:var(--bg-warn); color:var(--text-warn); }
  .b-member{ background:var(--bg-success); color:var(--text-success); } .b-wait{ background:var(--bg-danger); color:var(--text-danger); }
  .b-b2c{ background:var(--bg-purple); color:var(--text-purple); }
  .b-paid{ background:var(--bg-success); color:var(--text-success); } .b-trial{ background:var(--surface-1); color:var(--text-muted); }
  .b-pending{ background:var(--bg-warn); color:var(--text-warn); } .b-approved{ background:var(--bg-success); color:var(--text-success); } .b-rejected{ background:var(--bg-danger); color:var(--text-danger); }
  .b-verified{ background:var(--bg-success); color:var(--text-success); } .b-req{ background:var(--bg-warn); color:var(--text-warn); }
  .btn{ padding:6px 12px; border:none; border-radius:var(--radius); font-weight:500; cursor:pointer; font-size:12px; font-family:inherit; }
  .btn.g{ background:var(--text-accent); color:#fff; } .btn.o{ background:var(--surface-2); color:var(--text-secondary); border:.5px solid var(--border); } .btn.gold{ background:var(--text-warn); color:#fff; }
  .btn:disabled{ opacity:.5; }
  input.ci{ width:110px; padding:6px 8px; border:.5px solid var(--border); border-radius:6px; font-size:12px; background:var(--surface-2); color:var(--text-primary); font-family:inherit; }
  .muted{ color:var(--text-muted); font-size:13px; }
  .center{ display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:20px; }
  .soon{ background:var(--surface-1); border:.5px dashed var(--border); border-radius:12px; padding:38px; text-align:center; color:var(--text-muted); font-size:13px; }
  .filt{ display:inline-flex; border:.5px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:14px; }
  .filt button{ background:var(--surface-2); border:none; padding:7px 14px; font-size:12px; color:var(--text-secondary); cursor:pointer; font-family:inherit; }
  .filt button.on{ background:var(--bg-accent); color:var(--text-accent); font-weight:500; }
  h2,h3{ font-weight:500; }
  @media(max-width:720px){ .wrap{ grid-template-columns:1fr; } .side{ position:static; height:auto; } }
</style>
</head>
<body>
<div id="gate" class="center"><div class="muted">불러오는 중…</div></div>

<div id="app" class="wrap" style="display:none">
  <aside class="side">
    <div class="brand"><div class="av">A</div><div><div class="nm">아르케</div><div class="ro">본사 관리자</div></div></div>
    <div class="nav on" data-t="dash" onclick="go('dash')"><i class="ti ti-layout-dashboard"></i>대시보드</div>
    <div class="navlabel">회원</div>
    <div class="nav" data-t="acad" onclick="go('acad')"><i class="ti ti-building-store"></i>학원 회원</div>
    <div class="nav" data-t="parent" onclick="go('parent')"><i class="ti ti-users"></i>학부모 회원</div>
    <div class="navlabel">영업</div>
    <div class="nav" data-t="mgr" onclick="go('mgr')"><i class="ti ti-user-star"></i>영업매니저<span class="b" id="nb-mgr" style="display:none">0</span></div>
    <div class="nav" data-t="commission" onclick="go('commission')"><i class="ti ti-coin"></i>커미션·정산</div>
    <div class="nav" data-t="posts" onclick="go('posts')"><i class="ti ti-speakerphone"></i>공지·자료 배포</div>
    <div class="nav" data-t="mreq" onclick="go('mreq')"><i class="ti ti-message-2"></i>매니저 요청<span class="b" id="nb-mreq" style="display:none">0</span></div>
    <div class="navlabel">운영</div>
    <div class="nav" data-t="admission" onclick="go('admission')"><i class="ti ti-database"></i>입시 자료</div>
    <div class="nav" data-t="apikey" onclick="go('apikey')"><i class="ti ti-key"></i>API 키</div>
    <div class="nav" data-t="slot" onclick="go('slot')"><i class="ti ti-shield-check"></i>슬롯 무결성</div>
    <div class="nav" data-t="billing" onclick="go('billing')"><i class="ti ti-credit-card"></i>결제</div>
    <div class="foot"><b id="who">관리자</b><small>로그·알 입시연구소</small>
      <button class="lo" onclick="doLogout()">로그아웃</button></div>
  </aside>
  <main class="main" id="panel"><div class="muted">불러오는 중…</div></main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/shared/config.js"></script>
<script src="/shared/supabase.js"></script>
<script src="/shared/ai.js"></script>
<script src="/shared/auth.js"></script>
<script>

  var SUMMARY = null;
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];});}
  window.doLogout = async function(){ await signOut(); location.replace('/login'); };

  // admin-api 엣지함수 호출 (옛 콘솔과 동일 백엔드 재사용)
  async function adminApi(payload){
    var s = await getSession();
    var r = await fetch(FN_BASE + '/admin-api', {
      method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+(s?s.access_token:'')},
      body: JSON.stringify(payload)
    });
    return await r.json();
  }

  (async function init(){
   try{
    var session = await getSession();
    if(!session){ location.replace('/login'); return; }
    var info = await resolveRole(session.user);
    if(!info.isAdmin){
      document.getElementById('gate').innerHTML = '<div><div class="h1" style="font-size:22px">접근 권한 없음</div><p class="muted">관리자 전용입니다.</p><button class="lo" style="max-width:160px" onclick="doLogout()">로그아웃</button></div>';
      return;
    }
    document.getElementById('gate').style.display='none';
    document.getElementById('app').style.display='grid';
    document.getElementById('who').textContent = session.user.email || '관리자';
    go('dash');
   }catch(e){
    document.getElementById('gate').innerHTML = '<div><div class="h1" style="font-size:22px">불러오기 오류</div><p class="muted">'+(e&&e.message||e)+'</p><button class="lo" style="max-width:160px" onclick="doLogout()">로그아웃</button></div>';
    document.getElementById('gate').style.display='flex';
   }
  })();

  window.go = function(t){
    document.querySelectorAll('.nav').forEach(function(n){ n.classList.toggle('on', n.dataset.t===t); });
    var p = document.getElementById('panel');
    p.innerHTML = '<div class="muted">불러오는 중…</div>';
    if(t==='dash') return renderDash(p);
    if(t==='acad') return renderMembers(p, 'b2b');
    if(t==='parent') return renderMembers(p, 'b2c');
    if(t==='mgr') return renderManagers(p);
    if(t==='commission') return renderCommission(p);
    if(t==='posts') return renderPosts(p);
    if(t==='mreq') return renderMReq(p);
    if(t==='slot') return renderSlot(p);
    if(t==='admission') return renderAdmission(p);
    if(t==='apikey') return renderApiKey(p);
    if(t==='billing') return renderBilling(p);
    p.innerHTML = '<div class="muted">알 수 없는 탭</div>';
  };

  // ===== 대시보드 =====
  async function renderDash(p){
    var r = await sb.rpc('admin_dashboard_summary');
    var s = (r.data && r.data[0]) || {}; SUMMARY = s;
    var alerts = '';
    if((s.managers_pending||0)>0) alerts += '<div class="chip" onclick="go(\'mgr\')">매니저 승인 대기 <b>'+s.managers_pending+'</b></div>';
    if((s.bank_pending||0)>0) alerts += '<div class="chip" onclick="go(\'mgr\')">정산계좌 확인 대기 <b>'+s.bank_pending+'</b></div>';
    if(!alerts) alerts = '<div class="chip ok">✓ 처리 대기 항목 없음</div>';
    var b = document.getElementById('nb-mgr');
    if((s.managers_pending||0)>0){ b.style.display='inline'; b.textContent=s.managers_pending; } else b.style.display='none';
    p.innerHTML =
      '<div class="h1">본사 대시보드</div><div class="sub">'+new Date().toISOString().slice(0,10)+' 기준</div>'
      + '<div class="alert">'+alerts+'</div>'
      + '<div class="kpis">'
      + '<div class="kpi"><div class="lab">학원 회원</div><div class="num">'+(s.academies||0)+'<small> 곳</small></div></div>'
      + '<div class="kpi"><div class="lab">학부모 회원</div><div class="num">'+(s.parents||0)+'<small> 명</small></div></div>'
      + '<div class="kpi"><div class="lab">영업매니저</div><div class="num">'+(s.managers||0)+'<small> 명</small></div></div>'
      + '<div class="kpi"><div class="lab">전체 학생</div><div class="num">'+(s.students||0)+'<small> 명</small></div></div>'
      + '</div>';
  }

  // ===== 학원/학부모 회원 =====
  async function renderMembers(p, type){
    var title = type==='b2c' ? '학부모 회원' : '학원 회원';
    p.innerHTML = '<div class="h1">'+title+'</div><div class="sub">회원 승인·상태 관리</div><div id="mlist"><div class="muted">불러오는 중…</div></div>';
    var d = await adminApi({action:'academies'});
    var list = document.getElementById('mlist');
    if(d.error){ list.innerHTML='<div class="muted">오류: '+esc(d.error)+'</div>'; return; }
    var rows = (d.rows||[]).filter(function(a){
      if(a.is_admin) return false;
      return type==='b2c' ? a.account_type==='b2c' : a.account_type!=='b2c';
    });
    if(!rows.length){ list.innerHTML='<div class="muted">회원이 없습니다.</div>'; return; }
    list.innerHTML = rows.map(function(a){
      var ap = a.approved!==false;
      var kind = a.is_demo ? '<span class="badge b-demo">체험</span>' : (ap?'<span class="badge b-member">정회원</span>':'<span class="badge b-wait">승인대기</span>');
      var btns='';
      if(!ap && !a.is_demo) btns += '<button class="btn g" onclick="mApprove(\''+a.id+'\')">승인</button> ';
      if(a.is_demo) btns += '<button class="btn g" onclick="mDemo(\''+a.id+'\',false)">정회원 전환</button>';
      else btns += '<button class="btn o" onclick="mDemo(\''+a.id+'\',true)">체험 전환</button>';
      return '<div class="row"><div><div class="nm">'+esc(a.name||'-')+' '+kind+'</div>'
        + '<div class="meta">코드 '+esc(a.code||'-')+' · 학생 '+(a.students||0)+'명 · '+String(a.created_at||'').slice(0,10)+'</div></div>'
        + '<div style="display:flex;gap:6px">'+btns+'</div></div>';
    }).join('');
  }
  window.mApprove = async function(id){ var r=await adminApi({action:'approve',academy_id:id,approved:true}); if(r.error)return alert('실패: '+r.error); go(document.querySelector('.nav.on').dataset.t); };
  window.mDemo = async function(id,toDemo){ var r=await adminApi({action:'set_demo',academy_id:id,is_demo:toDemo}); if(r.error)return alert('실패: '+r.error); go(document.querySelector('.nav.on').dataset.t); };

  // ===== 영업매니저 =====
  async function renderManagers(p){
    p.innerHTML = '<div class="h1">영업매니저 관리</div><div class="sub">가입 승인·코드 발행·정산 계좌 확인</div><div id="mgrlist"><div class="muted">불러오는 중…</div></div>';
    var r = await sb.rpc('admin_list_managers');
    var list = document.getElementById('mgrlist');
    if(r.error){ list.innerHTML='<div class="muted">오류: '+esc(r.error.message)+'</div>'; return; }
    var rows = r.data||[];
    if(!rows.length){ list.innerHTML='<div class="muted">등록된 매니저가 없습니다.</div>'; return; }
    list.innerHTML = rows.map(function(m){
      var stat = '<span class="badge b-'+esc(m.status)+'">'+({pending:'대기',approved:'승인',rejected:'반려'})[m.status]+'</span>';
      var code = m.ref_code ? '코드 <b>'+esc(m.ref_code)+'</b>' : (m.status==='pending'
        ? '<input class="ci" id="code-'+m.id+'" placeholder="희망:'+esc(m.desired_code||'자동')+'" value="'+esc(m.desired_code||'')+'">' : '—');
      var bank='';
      if(m.bank_name){
        var bs = m.bank_status==='verified' ? '<span class="badge b-verified">확인됨</span>' : '<span class="badge b-req">확인대기</span>';
        bank = '<div class="meta">💳 '+esc(m.bank_name)+' '+esc(m.account_no)+' / '+esc(m.holder_name)+' '+bs+'</div>';
        if(m.bank_status!=='verified') bank += '<button class="btn gold" style="margin-top:5px" onclick="vBank(\''+m.id+'\')">계좌 확인완료</button>';
      }
      var act='';
      if(m.status==='pending') act = '<button class="btn g" onclick="aApprove(\''+m.id+'\')">승인+코드발행</button> <button class="btn o" onclick="aReject(\''+m.id+'\')">반려</button>';
      return '<div class="row"><div style="flex:1"><div class="nm">'+esc(m.name||'-')+' '+stat+'</div>'
        + '<div class="meta">'+esc(m.email||'')+' · '+code+' · 회원 '+(m.member_count||0)+'명</div>'+bank+'</div>'
        + '<div style="display:flex;gap:6px">'+act+'</div></div>';
    }).join('');
  }
  window.aApprove = async function(id){
    var el=document.getElementById('code-'+id); var desired = el?(el.value||'').trim():null;
    var r=await sb.rpc('approve_manager',{p_manager_id:id,p_desired:desired||null});
    if(r.error)return alert('승인 실패: '+r.error.message);
    alert('승인 완료 · 코드: '+((r.data&&r.data[0]&&r.data[0].ref_code)||'')); go('mgr');
  };
  window.aReject = async function(id){ if(!confirm('반려할까요?'))return; var r=await sb.rpc('reject_manager',{p_manager_id:id}); if(r.error)return alert('실패: '+r.error.message); go('mgr'); };
  window.vBank = async function(id){ if(!confirm('계좌확인서를 대조하셨나요? 확인완료 처리합니다.'))return; var r=await sb.rpc('verify_manager_bank',{p_manager_id:id}); if(r.error)return alert('실패: '+r.error.message); go('mgr'); };

  // ===== 커미션·정산 =====
  function won(n){ return '₩'+Number(n||0).toLocaleString(); }
  async function renderCommission(p){
    p.innerHTML = '<div class="h1">커미션·정산</div><div class="sub">구독료 기준 · 첫 2개월 50% → 이후 35% · 킬러콘텐츠·본사직접인입 제외</div><div id="clist"><div class="muted">불러오는 중…</div></div>';
    var r = await sb.rpc('manager_commission');
    var list = document.getElementById('clist');
    if(r.error){ list.innerHTML='<div class="muted">오류: '+esc(r.error.message)+'</div>'; return; }
    var rows = r.data||[];
    if(!rows.length){ list.innerHTML='<div class="muted">귀속 회원이 있는 매니저가 없습니다.</div>'; return; }
    // 매니저별 그룹
    var byMgr = {};
    rows.forEach(function(x){
      if(!byMgr[x.manager_id]) byMgr[x.manager_id] = { name:x.manager_name, code:x.ref_code, members:[], total:0, revenue:0 };
      byMgr[x.manager_id].members.push(x);
      byMgr[x.manager_id].total += (x.commission||0);
      byMgr[x.manager_id].revenue += (x.subscribed ? (x.monthly_amount||0) : 0);
    });
    var totalCommission = rows.reduce(function(s,x){return s+(x.commission||0);},0);
    var html = '<div class="kpis" style="grid-template-columns:repeat(2,1fr);max-width:520px">'

  function uploadBox(table, hint){
    return '<div class="card"><h3>데이터 추가 · '+esc(table)+'</h3>'
      + '<div class="muted" style="font-size:11px;margin-bottom:8px">CSV 붙여넣기 (첫 줄=헤더). 컬럼 예: '+esc(hint)+'</div>'
      + '<textarea id="up-'+table+'" rows="5" placeholder="header1,header2&#10;val1,val2" style="width:100%;padding:9px;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;color:var(--ink);font-size:12px;resize:vertical;font-family:monospace"></textarea>'

  window.csvUpload = async function(table){
    var m=document.getElementById('upmsg-'+table);
    var raw=(document.getElementById('up-'+table).value||'').trim();
    if(!raw){ m.style.color='var(--risk)'; m.textContent='CSV를 입력하세요.'; return; }
    var lines=raw.split(/\r?\n/).filter(function(x){return x.trim();});
    var hd=lines[0].split(',').map(function(x){return x.trim().replace(/\(JSON\)/i,'');});
    var rows=[];
    for(var i=1;i<lines.length;i++){
      var cells=lines[i].split(','); var o={};
      hd.forEach(function(h,idx){ var v=(cells[idx]||'').trim(); if(/^\[|^\{/.test(v)){try{v=JSON.parse(v);}catch(e){}} o[h]=v; });
      rows.push(o);
    }
    m.style.color='var(--ink-mute)'; m.textContent='추가 중…';
    var r=await adminApi({action:'insert', table:table, rows:rows});
    if(r.error){ m.style.color='var(--risk)'; m.textContent='실패: '+r.error; return; }
    m.style.color='var(--safe)'; m.textContent=(r.inserted||rows.length)+'건 추가 완료.';
    document.getElementById('up-'+table).value='';
  };

    if(r.error){ list.innerHTML='<div class="muted">목록 오류: '+esc(r.error.message)+'</div>'; return; }
    var rows=r.data||[];
    if(!rows.length){ list.innerHTML='<div class="muted" style="margin-top:14px">아직 게시글이 없습니다.</div>'; return; }
    list.innerHTML = '<div class="card" style="margin-top:14px"><h3>게시글 ('+rows.length+')</h3>'
      + rows.map(function(x){
        var cat = '<span class="badge b-demo">'+esc(CAT_LABEL[x.category]||x.category)+'</span>';
        var pin = x.pinned ? ' 📌' : '';
        return '<div class="row"><div style="flex:1"><div class="nm" style="font-size:13px">'+esc(x.title)+pin+' '+cat+'</div>'
          + '<div class="meta">'+String(x.created_at||'').slice(0,10)+(x.link_url?' · 링크 있음':'')+'</div></div>'
          + '<button class="btn o" onclick="pDel(\''+x.id+'\')">삭제</button></div>';
      }).join('') + '</div>';
  }
  window.pDel = async function(id){
    if(!confirm('이 글을 삭제할까요?')) return;
    var r = await sb.from('hq_posts').delete().eq('id',id);
    if(r.error){ alert('삭제 실패: '+r.error.message); return; }
    pLoad();
  };

  // ===== 슬롯 무결성 =====
  async function renderSlot(p){
    p.innerHTML = '<div class="h1">슬롯 무결성</div><div class="sub">창체 지문 기반 슬롯 재활용 의심 모니터링</div><div id="slist"><div class="muted">불러오는 중…</div></div>';
    p.innerHTML = '<div class="h1">슬롯 무결성</div><div class="sub">창체 지문 기반 슬롯 재활용 의심 모니터링</div><div id="slist"><div class="muted">불러오는 중…</div></div>';
    var r = await sb.rpc('admin_flagged_slots');
    var list = document.getElementById('slist');
    if(r.error){ list.innerHTML='<div class="muted">오류: '+esc(r.error.message||'')+'</div>'; return; }
    var rows = r.data||[];
    if(!rows.length){ list.innerHTML='<div class="card" style="color:var(--ink-mute)">플래그된 슬롯이 없습니다. ✓</div>'; return; }
    list.innerHTML = rows.map(function(x){
      var pct=Math.round((x.overlap||0)*100);
      var ov = x.overridden ? '<span class="badge b-demo">사유입력 진행됨</span>' : '<span class="badge" style="background:var(--risk);color:#fff">차단됨</span>';
      return '<div class="row"><div><div class="nm">'+esc(x.student_name||x.student_id||'-')+' '+ov+'</div><div class="meta">기존과 겹침 '+pct+'%</div></div></div>';
    }).join('');
  }
</script>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>아르케 · 영업매니저</title>
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css" rel="stylesheet">
<style>
  :root{
    --surface-0:#eef0eb; --surface-1:#f5f6f2; --surface-2:#ffffff;
    --border:rgba(22,26,22,.11); --radius:8px;
    --text-primary:#1d211d; --text-secondary:#5f5e5a; --text-muted:#9a9a94;
    --bg-accent:#E6F1FB; --text-accent:#185FA5;
    --bg-success:#E1F5EE; --text-success:#0F6E56;
    --bg-danger:#FCEBEB; --text-danger:#A32D2D;
    --bg-warn:#FAEEDA; --text-warn:#854F0B;
    --font-sans:'Noto Sans KR',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --font-mono:'JetBrains Mono',ui-monospace,monospace;
  }
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono&display=swap');
  *{ box-sizing:border-box; }
  body{ margin:0; min-height:100vh; background:var(--surface-0); font-family:var(--font-sans); color:var(--text-primary); -webkit-font-smoothing:antialiased; }
  .wrap{ display:grid; grid-template-columns:196px 1fr; min-height:100vh; }
  .side{ background:var(--surface-1); border-right:.5px solid var(--border); padding:14px 11px; display:flex; flex-direction:column; gap:3px; position:sticky; top:0; height:100vh; overflow-y:auto; }
  .brand{ padding:6px 8px 16px; display:flex; align-items:center; gap:8px; }
  .brand .av{ width:28px; height:28px; border-radius:7px; background:var(--bg-accent); color:var(--text-accent); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:15px; }
  .brand .nm{ font-size:13.5px; font-weight:500; } .brand .ro{ font-size:10px; color:var(--text-muted); }
  .nav{ display:flex; align-items:center; gap:10px; padding:9px 11px; border-radius:var(--radius); color:var(--text-secondary); font-size:13px; cursor:pointer; user-select:none; }
  .nav i{ font-size:18px; }
  .nav:hover{ background:var(--surface-2); color:var(--text-primary); }
  .nav.on{ background:var(--bg-accent); color:var(--text-accent); font-weight:500; }
  .side .foot{ margin-top:auto; padding:12px 8px 4px; border-top:.5px solid var(--border); }
  .side .foot .nm{ font-size:12px; font-weight:500; } .side .foot .cd{ font-size:10px; color:var(--text-muted); font-family:var(--font-mono); margin-top:1px; }
  .lo{ margin-top:11px; width:100%; padding:8px; background:var(--surface-2); color:var(--text-secondary); border:.5px solid var(--border); border-radius:var(--radius); font-size:12px; cursor:pointer; font-family:inherit; }
  .lo:hover{ color:var(--text-primary); }
  .main{ padding:20px 26px 50px; background:var(--surface-2); min-height:100vh; }
  .head{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:16px; }
  .head h2{ font-size:19px; font-weight:500; margin:0; }
  .head .date{ font-size:11px; color:var(--text-muted); }
  .codebar{ display:flex; align-items:center; justify-content:space-between; gap:12px; background:var(--bg-accent); border-radius:var(--radius); padding:13px 16px; margin-bottom:16px; flex-wrap:wrap; }
  .codebar .lab{ font-size:11px; color:var(--text-accent); opacity:.85; }
  .codebar .code{ font-size:26px; font-weight:500; color:var(--text-accent); font-family:var(--font-mono); letter-spacing:.03em; }
  .copybtn{ padding:7px 14px; background:var(--text-accent); color:#fff; border:none; border-radius:var(--radius); font-size:12px; font-weight:500; cursor:pointer; font-family:inherit; }
  .kpis{ display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:11px; margin-bottom:18px; }
  .kpi{ background:var(--surface-1); border-radius:var(--radius); padding:12px 14px; }
  .kpi .lab{ font-size:12px; color:var(--text-secondary); }
  .kpi .val{ font-size:23px; font-weight:500; margin-top:4px; }
  .kpi .val small{ font-size:12px; color:var(--text-muted); font-weight:400; }
  .kpi .sub{ font-size:11px; color:var(--text-secondary); margin-top:2px; }
  .kpi .sub.up{ color:var(--text-success); } .kpi .sub.dn{ color:var(--text-danger); }
  .grid2{ display:grid; grid-template-columns:minmax(0,1.55fr) minmax(0,1fr); gap:16px; }
  .secttl{ font-size:13px; font-weight:500; margin-bottom:8px; display:flex; align-items:center; gap:6px; }
  .secttl i{ font-size:15px; color:var(--text-accent); }
  .tbox{ border:.5px solid var(--border); border-radius:12px; overflow:hidden; }
  table{ width:100%; border-collapse:collapse; font-size:12.5px; }
  thead tr{ background:var(--surface-1); color:var(--text-secondary); text-align:left; }
  th{ padding:8px 10px; font-weight:500; }
  td{ padding:9px 10px; border-top:.5px solid var(--border); }
  .pill{ font-size:11px; padding:2px 8px; border-radius:20px; }
  .p-succ{ background:var(--bg-success); color:var(--text-success); } .p-acc{ background:var(--bg-accent); color:var(--text-accent); }
  .p-warn{ background:var(--bg-warn); color:var(--text-warn); } .p-mut{ background:var(--surface-1); color:var(--text-muted); }
  .listbox{ border:.5px solid var(--border); border-radius:12px; padding:2px 14px; }
  .li{ padding:10px 0; border-bottom:.5px solid var(--border); } .li:last-child{ border-bottom:0; }
  .li .t{ font-size:12.5px; } .li .m{ font-size:11px; color:var(--text-muted); margin-top:2px; }
  .li .bd{ font-size:12px; color:var(--text-secondary); margin-top:4px; white-space:pre-wrap; line-height:1.6; }
  .li a{ color:var(--text-accent); font-size:12px; text-decoration:none; }
  .note{ font-size:11px; color:var(--text-muted); margin-top:6px; }
  .card{ background:var(--surface-2); border:.5px solid var(--border); border-radius:12px; padding:18px; }
  input{ width:100%; padding:10px 12px; background:var(--surface-2); border:.5px solid var(--border); border-radius:var(--radius); color:var(--text-primary); font-size:13px; margin-bottom:10px; font-family:inherit; }
  input:focus{ outline:none; border-color:var(--text-accent); }
  .btn{ padding:10px 16px; background:var(--text-accent); color:#fff; border:none; border-radius:var(--radius); font-weight:500; cursor:pointer; font-size:13px; font-family:inherit; }
  .btn:disabled{ opacity:.6; }
  .bankst{ font-size:12px; padding:9px 12px; border-radius:var(--radius); margin-bottom:12px; }
  .bankst.v{ background:var(--bg-success); color:var(--text-success); } .bankst.r{ background:var(--bg-warn); color:var(--text-warn); }
  .muted{ color:var(--text-muted); font-size:13px; }
  .empty{ text-align:center; padding:28px; color:var(--text-muted); font-size:13px; }
  .center{ display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; text-align:center; }
  @media(max-width:720px){ .grid2{ grid-template-columns:1fr; } .wrap{ grid-template-columns:1fr; } .side{ position:static; height:auto; } }
</style>
</head>
<body>
<div id="gate" class="center"><div class="muted">불러오는 중…</div></div>

<div id="app" class="wrap" style="display:none">
  <aside class="side">
    <div class="brand"><div class="av">A</div><div><div class="nm">아르케</div><div class="ro">영업매니저</div></div></div>
    <div class="nav on" data-t="dash" onclick="go('dash')"><i class="ti ti-layout-dashboard"></i>대시보드</div>
    <div class="nav" data-t="members" onclick="go('members')"><i class="ti ti-users"></i>내 회원</div>
    <div class="nav" data-t="commission" onclick="go('commission')"><i class="ti ti-coin"></i>매출·커미션</div>
    <div class="nav" data-t="sales" onclick="go('sales')"><i class="ti ti-file-text"></i>영업지원 자료</div>
    <div class="nav" data-t="notice" onclick="go('notice')"><i class="ti ti-speakerphone"></i>본사 소식</div>
    <div class="nav" data-t="news" onclick="go('news')"><i class="ti ti-news"></i>입시 뉴스</div>
    <div class="nav" data-t="bank" onclick="go('bank')"><i class="ti ti-building-bank"></i>정산 계좌</div>
    <div class="foot"><div class="nm" id="mgr-name">매니저</div><div class="cd" id="mgr-code">코드 —</div>
      <button class="lo" onclick="doLogout()">로그아웃</button></div>
  </aside>
  <main class="main" id="panel"><div class="muted">불러오는 중…</div></main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/shared/config.js"></script>
<script src="/shared/supabase.js"></script>
<script src="/shared/ai.js"></script>
<script src="/shared/auth.js"></script>
<script>
  var MGR=null;
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];});}
  function won(n){ return '₩'+Number(n||0).toLocaleString(); }
  function ymd(s){ return String(s||'').slice(5,10).replace('-','.'); }
  window.doLogout = async function(){ await signOut(); location.replace('/login'); };
  window.copyCode = function(){ if(!MGR||!MGR.ref_code)return; navigator.clipboard.writeText(MGR.ref_code).then(function(){ var b=document.getElementById('copyBtn'); if(b){var t=b.textContent;b.textContent='복사됨';setTimeout(function(){b.textContent=t;},1400);} }); };

  (async function init(){
   try{
    var session = await getSession();
    if(!session){ location.replace('/login'); return; }
    var r = await sb.from('sales_managers').select('id,name,ref_code,status').eq('uid',session.user.id).limit(1);
    if(r.error || !r.data || !r.data.length){
      document.getElementById('gate').innerHTML='<div><h2>영업매니저 계정이 아닙니다</h2><p class="muted">승인된 영업매니저 전용입니다.</p><button class="btn" onclick="doLogout()">로그아웃</button></div>'; return;
    }
    MGR=r.data[0];
    if(MGR.status!=='approved'){
      var lbl=MGR.status==='rejected'?'가입이 반려되었습니다.':'가입 신청이 접수되었습니다. 본사 승인 후 이용 가능합니다.';
      document.getElementById('gate').innerHTML='<div><h2>승인 대기 중</h2><p class="muted">'+lbl+'</p><button class="btn" onclick="doLogout()">로그아웃</button></div>'; return;
    }
    document.getElementById('gate').style.display='none';
    document.getElementById('app').style.display='grid';
    document.getElementById('mgr-name').textContent=MGR.name||'매니저';
    document.getElementById('mgr-code').textContent=MGR.ref_code?('귀속코드 '+MGR.ref_code):'코드 발행 대기';
    go('dash');
   }catch(e){
    document.getElementById('gate').innerHTML='<div><h2>불러오기 오류</h2><p class="muted">'+(e&&e.message||e)+'</p><button class="btn" onclick="doLogout()">로그아웃</button></div>';
    document.getElementById('gate').style.display='flex';
   }
  })();

  window.go=function(t){
    document.querySelectorAll('.nav').forEach(function(n){ n.classList.toggle('on', n.dataset.t===t); });
    var p=document.getElementById('panel'); p.innerHTML='<div class="muted">불러오는 중…</div>';
    if(t==='dash') return renderDash(p);
    if(t==='members') return renderMembers(p);
    if(t==='commission') return renderCommission(p);
    if(t==='sales') return renderPosts(p,'sales','영업지원 자료','본사가 배포한 영업 자료입니다.');
    if(t==='notice') return renderPosts(p,'notice','본사 소식','본사 공지사항입니다.');
    if(t==='news') return renderPosts(p,'news','입시 뉴스','입시 관련 소식입니다.');
    if(t==='bank') return renderBank(p);
  };

  function pill(x){
    if(!x.subscribed) return '<span class="pill p-mut">체험/대기</span>';
    var cls = x.rate_pct===50 ? 'p-acc' : 'p-succ';
    return '<span class="pill '+cls+'">유료 '+x.months_active+'개월</span>';
  }

  async function renderDash(p){
    var code = MGR.ref_code
      ? '<div><div class="lab">내 영업코드 · 회원가입 시 안내하세요</div><div class="code">'+esc(MGR.ref_code)+'</div></div><button class="copybtn" id="copyBtn" onclick="copyCode()">복사</button>'
      : '<div><div class="lab">내 영업코드</div><div class="code" style="font-size:18px">발행 대기</div></div>';
    p.innerHTML =
      '<div class="head"><h2>대시보드</h2><span class="date">'+new Date().toISOString().slice(0,10)+' 기준</span></div>'
      + '<div class="codebar">'+code+'</div>'
      + '<div class="kpis" id="kpis"><div class="muted">불러오는 중…</div></div>'
      + '<div class="grid2">'
      + '<section><div class="secttl">내 회원 현황</div><div class="tbox" id="memtbl"><div class="muted" style="padding:14px">불러오는 중…</div></div>'
      + '<div class="note">50% = 유치 초기 2개월 · 이후 35% · 연 4개월+ 유지 시 연말 배당 5%</div></section>'
      + '<div style="display:flex;flex-direction:column;gap:16px">'
      + '<section><div class="secttl"><i class="ti ti-speakerphone"></i>본사 소식</div><div class="listbox" id="d-notice"><div class="muted" style="font-size:12px;padding:6px 0">불러오는 중…</div></div></section>'
      + '<section><div class="secttl"><i class="ti ti-news"></i>입시 뉴스·이슈</div><div class="listbox" id="d-news"><div class="muted" style="font-size:12px;padding:6px 0">불러오는 중…</div></div></section>'
      + '</div></div>';

    var sr = await sb.rpc('my_manager_summary');
    var s = (sr.data && sr.data[0]) || {total:0,paid:0,trial:0,commission:0};
    var conv = s.total>0 ? Math.round((s.paid/s.total)*100) : 0;
    document.getElementById('kpis').innerHTML =
        '<div class="kpi"><div class="lab">관리 회원</div><div class="val">'+(s.total||0)+'<small> 명</small></div><div class="sub">유료 '+(s.paid||0)+' · 체험 '+(s.trial||0)+'</div></div>'
      + '<div class="kpi"><div class="lab">이번 달 예상 커미션</div><div class="val">'+won(s.commission)+'</div><div class="sub">구독료 기준</div></div>'
      + '<div class="kpi"><div class="lab">유료 전환율</div><div class="val">'+conv+'<small> %</small></div><div class="sub">체험→유료</div></div>'
      + '<div class="kpi"><div class="lab">이탈 위험</div><div class="val" style="color:var(--text-danger)">'+(s.trial||0)+'<small> 명</small></div><div class="sub">체험·만료 임박</div></div>';

    var cr = await sb.rpc('my_commission');
    var rows = (cr.data||[]).slice(0,6);
    var mt = document.getElementById('memtbl');
    if(!rows.length){ mt.innerHTML='<div class="empty">아직 귀속 회원이 없습니다.</div>'; }
    else {
      mt.innerHTML='<table><thead><tr><th style="width:34%">회원</th><th style="width:22%">유형</th><th style="width:24%">상태</th><th style="width:20%;text-align:right">커미션</th></tr></thead><tbody>'
        + rows.map(function(x){
          var type=x.account_type==='b2c'?'학부모':'학원';
          var rate = x.subscribed ? '<span style="color:'+(x.rate_pct===50?'var(--text-accent)':'var(--text-secondary)')+'">'+x.rate_pct+'%</span>' : '<span class="muted">—</span>';
          return '<tr><td>'+esc(x.member_name||'-')+'</td><td style="color:var(--text-secondary)">'+type+'</td><td>'+pill(x)+'</td><td style="text-align:right">'+rate+'</td></tr>';
        }).join('') + '</tbody></table>';
    }

    loadList('d-notice','notice'); loadList('d-news','news');
  }
  async function loadList(id,cat){
    var r=await sb.from('hq_posts').select('title,category,created_at').eq('published',true).eq('category',cat).order('created_at',{ascending:false}).limit(3);
    var el=document.getElementById(id); if(!el)return; var rows=(r&&r.data)||[];
    var catlab={notice:'공지',sales:'자료',news:'뉴스'}[cat];
    el.innerHTML = rows.length ? rows.map(function(x){return '<div class="li"><div class="t">'+esc(x.title)+'</div><div class="m">'+catlab+' · '+ymd(x.created_at)+'</div></div>';}).join('') : '<div class="muted" style="font-size:12px;padding:8px 0">등록된 항목이 없습니다.</div>';
  }

  async function renderMembers(p){
    p.innerHTML='<div class="head"><h2>내 회원</h2></div><div class="tbox" id="ml"><div class="muted" style="padding:14px">불러오는 중…</div></div>';
    var r=await sb.rpc('my_referred_members'); var el=document.getElementById('ml');
    if(r.error){ el.innerHTML='<div class="muted" style="padding:14px">오류</div>'; return; }
    var rows=r.data||[];
    if(!rows.length){ el.innerHTML='<div class="empty">아직 귀속된 회원이 없습니다. 회원가입 시 내 영업코드를 안내하세요.</div>'; return; }
    el.innerHTML='<table><thead><tr><th>회원</th><th>유형</th><th>상태</th><th>가입일</th></tr></thead><tbody>'+rows.map(function(a){
      var type=a.account_type==='b2c'?'학부모':'학원';
      var st=(a.approved&&!a.is_demo)?'<span class="pill p-succ">유료</span>':'<span class="pill p-mut">체험/대기</span>';
      return '<tr><td>'+esc(a.name||'-')+'</td><td style="color:var(--text-secondary)">'+type+'</td><td>'+st+'</td><td class="muted">'+ymd(a.created_at)+'</td></tr>';
    }).join('')+'</tbody></table>';
  }

  async function renderCommission(p){
    p.innerHTML='<div class="head"><h2>매출·커미션</h2><span class="date">첫 2개월 50% → 이후 35%</span></div><div id="cl"><div class="muted">불러오는 중…</div></div>';
    var r=await sb.rpc('my_commission'); var el=document.getElementById('cl');
    if(r.error){ el.innerHTML='<div class="muted">오류: '+esc(r.error.message)+'</div>'; return; }
    var rows=r.data||[]; var total=rows.reduce(function(s,x){return s+(x.commission||0);},0);
    var head='<div class="kpis" style="grid-template-columns:repeat(2,minmax(0,1fr));max-width:420px">'
      +'<div class="kpi"><div class="lab">이번 달 예상 커미션</div><div class="val">'+won(total)+'</div><div class="sub">'+rows.length+'명 대상</div></div>'
      +'<div class="kpi"><div class="lab">회원 수</div><div class="val">'+rows.length+'<small> 명</small></div><div class="sub">&nbsp;</div></div></div>';
    if(!rows.length){ el.innerHTML=head+'<div class="tbox"><div class="empty">귀속 회원이 없습니다.</div></div>'; return; }
    el.innerHTML=head+'<div class="tbox"><table><thead><tr><th>회원</th><th>유형</th><th>구독</th><th>단계</th><th style="text-align:right">커미션</th></tr></thead><tbody>'+rows.map(function(x){
      var type=x.account_type==='b2c'?'학부모':'학원';
      if(!x.subscribed) return '<tr><td>'+esc(x.member_name||'-')+'</td><td style="color:var(--text-secondary)">'+type+'</td><td class="muted" colspan="3">미구독 (커미션 0)</td></tr>';
      return '<tr><td>'+esc(x.member_name||'-')+'</td><td style="color:var(--text-secondary)">'+type+'</td><td class="muted">월 '+won(x.monthly_amount)+' · '+x.months_active+'개월차</td><td>'+pill(x)+'</td><td style="text-align:right;font-weight:500">'+won(x.commission)+'</td></tr>';
    }).join('')+'</tbody></table></div><div class="note">실제 결제(구독) 기준으로 계산됩니다. 결제 연동 전에는 예상치입니다.</div>';
  }

  async function renderPosts(p,cat,title,desc){
    p.innerHTML='<div class="head"><h2>'+esc(title)+'</h2></div><div class="muted" style="margin:-8px 0 14px">'+esc(desc)+'</div><div id="pl"><div class="muted">불러오는 중…</div></div>';
    var r=await sb.from('hq_posts').select('title,body,link_url,pinned,created_at').eq('published',true).eq('category',cat).order('pinned',{ascending:false}).order('created_at',{ascending:false}).limit(50);
    var el=document.getElementById('pl');
    if(r.error){ el.innerHTML='<div class="muted">오류</div>'; return; }
    var rows=r.data||[];
    if(!rows.length){ el.innerHTML='<div class="tbox"><div class="empty">등록된 항목이 없습니다.</div></div>'; return; }
    el.innerHTML='<div class="listbox">'+rows.map(function(x){
      var pin=x.pinned?'📌 ':'';
      var link=x.link_url?'<div style="margin-top:6px"><a href="'+esc(x.link_url)+'" target="_blank" rel="noopener">자료 열기 →</a></div>':'';
      var body=x.body?'<div class="bd">'+esc(x.body)+'</div>':'';
      return '<div class="li"><div class="t" style="font-weight:500">'+pin+esc(x.title)+'</div><div class="m">'+ymd(x.created_at)+'</div>'+body+link+'</div>';
    }).join('')+'</div>';
  }

  async function renderBank(p){
    p.innerHTML='<div class="head"><h2>정산 계좌</h2></div><div class="muted" style="margin:-8px 0 14px">영업비를 받을 계좌를 등록하면 관리자가 확인합니다</div>'
      + '<div class="card" style="max-width:440px"><div id="bank-status"></div>'
      + '<input id="b-bank" placeholder="은행명 (예: 국민은행)"><input id="b-acc" placeholder="계좌번호"><input id="b-holder" placeholder="예금주명">'
      + '<div id="b-msg" style="font-size:12px;min-height:16px;margin-bottom:8px"></div>'
      + '<button class="btn" id="b-btn" onclick="saveBank()">계좌 확인요청 보내기</button>'
      + '<div class="note" style="margin-top:12px;line-height:1.6">· 관리자가 계좌확인서를 대조한 뒤 확인 완료 처리합니다.<br>· 계좌를 수정하면 다시 확인 대기 상태가 됩니다.</div></div>';
    var r=await sb.from('manager_bank_accounts').select('bank_name,account_no,holder_name,status').eq('manager_id',MGR.id).limit(1);
    var d=(r.data&&r.data[0])||null; var box=document.getElementById('bank-status');
    if(d){
      document.getElementById('b-bank').value=d.bank_name||''; document.getElementById('b-acc').value=d.account_no||''; document.getElementById('b-holder').value=d.holder_name||'';
      if(d.status==='verified'){ box.className='bankst v'; box.textContent='✓ 확인 완료된 계좌입니다.'; document.getElementById('b-btn').textContent='계좌 수정 (재확인 필요)'; }
      else { box.className='bankst r'; box.textContent='⏳ 확인 대기 중입니다.'; document.getElementById('b-btn').textContent='계좌 확인요청 다시 보내기'; }
    }
  }
  window.saveBank=async function(){
    var bank=(document.getElementById('b-bank').value||'').trim(), acc=(document.getElementById('b-acc').value||'').trim(), hold=(document.getElementById('b-holder').value||'').trim();
    var m=document.getElementById('b-msg');
    if(!bank||!acc||!hold){ m.style.color='var(--text-danger)'; m.textContent='은행명·계좌번호·예금주를 모두 입력하세요.'; return; }
    document.getElementById('b-btn').disabled=true; m.style.color='var(--text-muted)'; m.textContent='전송 중…';
    try{
      var r=await sb.from('manager_bank_accounts').upsert({manager_id:MGR.id,bank_name:bank,account_no:acc,holder_name:hold},{onConflict:'manager_id'});
      if(r.error) throw r.error;
      m.style.color='var(--text-success)'; m.textContent='확인요청을 보냈습니다.'; renderBank(document.getElementById('panel'));
    }catch(e){ m.style.color='var(--text-danger)'; m.textContent='오류: '+(e.message||e); }
    finally{ document.getElementById('b-btn').disabled=false; }
  };
</script>
</body>
</html>
